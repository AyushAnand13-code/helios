name: helios
version: '1.0.0'
config-version: 2
require-dbt-version: '>=1.7.0'

profile: helios

# The whole models/ tree. The governed registry lives OUTSIDE models/ (at
# semantic/semantic_layer.yaml) precisely so it isn't parsed as a dbt schema file —
# which lets the per-folder configs below (materialization, schema, access, partitioning)
# actually apply to staging / intermediate / marts.
model-paths: ['models']
seed-paths: ['seeds']
macro-paths: ['macros']
snapshot-paths: ['snapshots']
test-paths: ['tests']
analysis-paths: ['analyses']

clean-targets: ['target', 'dbt_packages']

vars:
  # Build window — matches the static public sample; prod overrides via --vars.
  ga4_start_date: '2020-11-01'
  ga4_end_date:   '2021-01-31'
  # Late-arrival lookback for incremental insert_overwrite.
  incremental_lookback_days: 3
  # Engaged-session threshold (msec); keeps the rule in one place.
  engagement_time_threshold_msec: 10000

# Surrogate-key salt + dispatch so dbt_utils macros resolve on BigQuery first.
dispatch:
  - macro_namespace: dbt_utils
    search_order: ['helios', 'dbt_utils']

models:
  +persist_docs:
    relation: true
    columns: true

  # NOTE: dbt group/access governance (+group / +access: private) is deferred — it needs a
  # coherent group design (staging is referenced by intermediate, so it can't be `private`
  # to a 'staging' group). Materialization/schema/partitioning below is what's enforced.
  helios:
    staging:
      +materialized: view
      +tags: ['staging', 'ga4']
      +schema: staging

    intermediate:
      # Models set materialized='table' in-file (sessionized/funnel_steps are read by
      # multiple marts; ephemeral re-computed them per consumer). This default matches.
      +materialized: table
      +tags: ['intermediate', 'ga4']

    marts:
      +schema: marts                   # -> helios_dev_marts (target dataset + this schema)
      core:
        # Plain tables on the static 3-month sample. (Models pin materialized='table'
        # in-file.) event_date partitioning + device/channel clustering is the intended
        # prod optimization — deferred so dims without those columns don't break the build.
        +materialized: table
        +tags: ['marts', 'core']

      finance:
        +materialized: table
        +tags: ['marts', 'finance']

seeds:
  helios:
    channel_group_mapping:
      +column_types:
        source: string
        medium: string
        channel_group: string

snapshots:
  helios:
    +target_schema: snapshots
    +tags: ['snapshot']
