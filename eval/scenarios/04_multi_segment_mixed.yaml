  inject_at: "2020-11-30"
  eval_window: {start: "2020-11-30", end: "2020-12-20"}
  target_metric: checkout_to_purchase_rate
  funnel_step: {numerator: purchasing_sessions, denominator: begin_checkout_sessions}
  anomaly: "Aggregate checkout_to_purchase_rate fell ~9% over the eval window (60.0% -> 54.5%); Referral tablet checkouts both completed at a lower rate and grew their share of begin_checkout_sessions."
  perturbation:
    dimension: [channel_group, device_category]
    segment: {channel_group: "Referral", device_category: "tablet"}
    rate_multiplier: 0.70
    volume_multiplier: 1.55
    hold_constant: []
  ground_truth:
    root_cause_segment: {channel_group: "Referral", device_category: "tablet"}
    dominant_effect: mixed
    mix_rate_interaction: {mix: -0.018, rate: -0.030, interaction: -0.007}
    is_seasonality_decoy: false
    is_data_quality: false
  expected_diagnosis: "The 5.5pt aggregate checkout_to_purchase_rate drop decomposes into rate=-0.030 (Referral tablet purchasing_sessions/begin_checkout_sessions down ~30% in-cell), mix=-0.018 (this low-completing cell grew its share of begin_checkout_sessions ~55%), and a sizeable -0.007 interaction (the enlarged share multiplies the rate decay — exactly the interaction term this bucket tests). Rate is the dominant and actionable component; mix is an acquisition-mix effect; the interaction is non-trivial here and must be reported separately rather than folded into either main term. Reconciles; significant (p<0.05)."
  expected_recommendation: "Fix the behavioral defect: audit the Referral tablet add_shipping_info -> payment -> purchase path for a layout/validation bug on tablet viewports that is dropping completion. A/B test a tablet-optimized checkout. Primary: checkout_to_purchase_rate; guardrails: add_shipping_info_sessions, add_payment_info_sessions, net_revenue. Flag the mix growth (Referral tablet begin_checkout share up ~55%) to acquisition as a separate item; because mix, rate, and interaction all compound negatively, recovering the rate alone reclaims the majority of the loss. Size via power_analysis."
  expected_revenue_impact:
    revenue_at_risk_usd: 47000
    basis: "rate-plus-interaction components (the actionable behavioral portion): (rate_t0 - rate_t1) applied to Referral tablet begin_checkout_sessions_t1 * aov, summed over eval_window"
    direction: loss

- scenario_id: S032
  title: "Paid Search x India view-to-cart: in-cell rate gain offset by collapsing share"
  bucket: multi_segment_mixed
  anomaly_type: mixed
  seed: 1032
  baseline_window: {start: "2021-01-02", end: "2021-01-16"}
  inject_at: "2021-01-17"
  eval_window: {start: "2021-01-17", end: "2021-01-31"}
  target_metric: view_to_cart_rate
  funnel_step: {numerator: add_to_cart_sessions, denominator: view_item_sessions}
  anomaly: "Aggregate view_to_cart_rate slipped ~4% over the eval window (28.0% -> 26.9%) even though the Paid Search India cell's view-to-cart rate rose; a steep share loss in that cell drove the net negative."
  perturbation:
    dimension: [channel_group, country]
    segment: {channel_group: "Paid Search", country: "India"}
    rate_multiplier: 1.15
    volume_multiplier: 0.55
    hold_constant: []
  ground_truth:
    root_cause_segment: {channel_group: "Paid Search", country: "India"}
    dominant_effect: mixed
    mix_rate_interaction: {mix: -0.017, rate: 0.009, interaction: -0.003}
    is_seasonality_decoy: false
    is_data_quality: false
  expected_diagnosis: "A classic confound where mix and rate OPPOSE. The Paid Search India cell's view_to_cart_rate (add_to_cart_sessions/view_item_sessions) actually rose ~15% in-cell (rate=+0.009), but the cell's share of view_item_sessions collapsed ~45% (mix=-0.017), with a -0.003 interaction; the net aggregate is ~ -0.011 (the small reported slip). The behavioral signal is positive and should not be touched; the actionable problem is the volume/acquisition loss of Paid Search India traffic. Critic must refute any 'product page is converting worse' narrative — in-cell rate improved. Reconciles; mix component significant (p<0.05), aggregate move modest."
  expected_recommendation: "Preserve the rate behavior (it improved) and consider replicating the Paid Search India product-page change in other geos. The actionable issue is mix: Paid Search India view_item volume fell ~45%, a paid-acquisition/budget-pacing matter — route to the SEM team to investigate bid/budget or geo-targeting changes. If any funnel test runs, hold view_to_cart_rate as a guardrail to protect the gain; track view_item_sessions and net_revenue as the primary recovery metrics for the lost volume."
  expected_revenue_impact:
    revenue_at_risk_usd: 18000
    basis: "mix-component only (the actionable loss): (view_item_sessions_t0_share - view_item_sessions_t1_share) * total_view_item_sessions_t1 * cell_view_to_cart_rate * downstream_purchase_propensity * aov, summed over eval_window"
    direction: loss
