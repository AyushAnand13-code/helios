# Helios Evaluation Benchmark - 50 labeled e-commerce anomaly scenarios (artifact A10.3)
# Generated 2026-06-03. Spec: HELIOS_PROJECT_BIBLE.md section 20 (Evaluation Framework).
# Buckets: single_segment_rate S001-S010 | single_segment_mix S011-S020 |
#   multi_segment_rate S021-S026 | multi_segment_mixed S027-S032 |
#   seasonality_decoy S033-S038 | no_anomaly_control S039-S044 | data_quality S045-S050
# This file is a bare YAML list of 50 scenario mappings: yaml.safe_load(f) -> list[dict].
# Each scenario carries the machine-readable injection spec + 5 labels:
#   anomaly, ground_truth, expected_diagnosis, expected_recommendation, expected_revenue_impact.
- scenario_id: S001
  title: "Paid Search x mobile checkout-to-purchase rate collapse"
  bucket: single_segment_rate
  anomaly_type: rate
  seed: 1001
  baseline_window: {start: "2020-12-01", end: "2020-12-20"}
  inject_at: "2020-12-21"
  eval_window: {start: "2020-12-21", end: "2021-01-10"}
  target_metric: checkout_to_purchase_rate
  funnel_step: {numerator: purchasing_sessions, denominator: begin_checkout_sessions}
  anomaly: "Aggregate checkout_to_purchase_rate fell 11% week-over-week (6.1% -> 5.4%) over the eval window; overall purchasing_sessions down ~9%."
  perturbation:
    dimension: [channel_group, device_category]
    segment: {channel_group: "Paid Search", device_category: "mobile"}
    rate_multiplier: 0.55
    volume_multiplier: null
    hold_constant: [sessions]
  ground_truth:
    root_cause_segment: {channel_group: "Paid Search", device_category: "mobile"}
    dominant_effect: rate
    mix_rate_interaction: {mix: 0.000, rate: -0.013, interaction: 0.000}
    is_seasonality_decoy: false
    is_data_quality: false
  expected_diagnosis: "Genuine rate-change isolated to Paid Search x mobile checkout (purchasing_sessions/begin_checkout_sessions down 45% in that cell only); mix across device/channel is flat, so this is in-segment behavior, not composition. Reconciles; significant (p<0.05)."
  expected_recommendation: "A/B test a simplified mobile payment step (one-tap wallet + autofill) for Paid Search mobile traffic. Primary: checkout_to_purchase_rate; guardrails: aov, cart_abandonment_rate, net_revenue. Size via power_analysis."
  expected_revenue_impact:
    revenue_at_risk_usd: 38000
    basis: "(rate_t0 - rate_t1) * begin_checkout_sessions_t1 * aov, summed over eval_window"
    direction: loss

