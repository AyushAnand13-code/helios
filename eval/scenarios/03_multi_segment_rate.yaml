- scenario_id: S026
  title: "Paid Social + Display cart_abandonment_rate spike from forced account-creation gate"
  bucket: multi_segment_rate
  anomaly_type: rate
  seed: 1026
  baseline_window: {start: "2020-12-01", end: "2020-12-19"}
  inject_at: "2020-12-20"
  eval_window: {start: "2020-12-20", end: "2021-01-09"}
  target_metric: cart_abandonment_rate
  funnel_step: {numerator: purchasing_sessions, denominator: add_to_cart_sessions}
  anomaly: "Aggregate cart_abandonment_rate rose ~8% week-over-week (82% -> 88.5%) over the eval window; purchasing_sessions relative to add_to_cart_sessions deteriorated while add_to_cart_sessions held flat."
  perturbation:
    dimension: [channel_group]
    segment: {channel_group: "Paid Social"}
    secondary_segments:
      - {channel_group: "Display"}
    rate_multiplier: 1.08
    volume_multiplier: null
    hold_constant: [sessions]
  ground_truth:
    root_cause_segment: {channel_group: "Paid Social"}
    also_affected_segments:
      - {channel_group: "Display"}
    dominant_effect: rate
    mix_rate_interaction: {mix: 0.000, rate: 0.065, interaction: 0.000}
    is_seasonality_decoy: false
    is_data_quality: false
  expected_diagnosis: "Genuine shared rate-change (a degradation): cart_abandonment_rate (1 - purchasing_sessions/add_to_cart_sessions) rose ~8 points in Paid Social and ~8 points in Display, while Direct, Organic Search, and Email abandoned at normal rates. Channel mix is flat, so the higher blended abandonment is in-segment, not driven by a swing toward cold paid traffic. Top-3 affected cells: Paid Social (primary), Display, then a minor paid-media aggregate echo. Both are cold first-touch paid audiences hitting a newly introduced forced account-creation gate before checkout; not a holiday artifact (Christmas peak decomposed to ~0). Reconciles; significant (p<0.05)."
  expected_recommendation: "Remove or defer the forced account-creation gate for cold paid traffic (enable guest checkout for Paid Social and Display landings), then re-measure. Primary: cart_abandonment_rate; guardrails: checkout_to_purchase_rate, revenue_per_session, net_revenue. Size via power_analysis on combined Paid Social + Display add_to_cart_sessions."
  expected_revenue_impact:
    revenue_at_risk_usd: 43000
    basis: "(rate_t1 - rate_t0) * add_to_cart_sessions_t1 * aov, summed over Paid Social and Display across eval_window (incremental abandoned carts)"
    direction: loss
