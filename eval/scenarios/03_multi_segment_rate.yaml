  funnel_step: {numerator: purchasing_sessions, denominator: begin_checkout_sessions}
  anomaly: "Aggregate checkout_to_purchase_rate rose ~11% week-over-week (52% -> 58%) over the eval window; purchasing_sessions up ~9% with begin_checkout_sessions roughly flat."
