    is_seasonality_decoy: false
    is_data_quality: true
  expected_diagnosis: "Late-arriving shard data-quality issue, not a behavior change; the one-day ~40% drop across all metrics is spurious. A single event_date partition is partially loaded, so volumes are uniformly under-counted on 2021-01-03 while ratio metrics (session_conversion_rate, aov) are unchanged and neighboring days are normal. Critic refutes: dip is confined to one partition and is not segment-specific."
  expected_recommendation: "Fix the data pipeline: wait for / backfill the 2021-01-03 shard, exclude that partition from the eval window, and re-run. Do NOT launch an experiment off a single under-loaded day."
