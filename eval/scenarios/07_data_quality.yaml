- scenario_id: S045
  title: "transaction_id duplication inflating revenue and aov on desktop"
  bucket: data_quality
  anomaly_type: none
  seed: 1045
  baseline_window: {start: "2020-11-15", end: "2020-12-05"}
  inject_at: "2020-12-06"
  eval_window: {start: "2020-12-06", end: "2020-12-26"}
  target_metric: aov
  funnel_step: {numerator: revenue, denominator: transactions}
  anomaly: "Aggregate revenue jumped ~28% and aov rose ~22% ($61 -> $74) week-over-week on desktop, with no corresponding rise in purchasing_sessions; transactions appear inflated."
  perturbation:
    dimension: [device_category]
    segment: {device_category: "desktop"}
    rate_multiplier: null
    volume_multiplier: null
    artifact: "transaction_id duplication: a subset of desktop orders ingested twice (duplicate transaction_id rows), double-counting transactions and revenue while purchasing_sessions stays flat"
    hold_constant: [sessions, purchasing_sessions]
  ground_truth:
    root_cause_segment: {device_category: "desktop"}
    dominant_effect: none
    mix_rate_interaction: {mix: 0.000, rate: 0.000, interaction: 0.000}
    is_seasonality_decoy: false
    is_data_quality: true
  expected_diagnosis: "transaction_id duplication data-quality issue, not a behavior change; the revenue/aov move is spurious. Duplicate transaction_id rows on desktop double-count transactions and revenue (~28% apparent revenue lift, aov $61 -> $74) while purchasing_sessions is unchanged, so per-session economics did not actually improve. Critic refutes: dedup transaction_id and the swing disappears."
  expected_recommendation: "Fix the data pipeline: deduplicate on transaction_id (keep first ingest), exclude the affected desktop partition, and re-run the diagnosis. Do NOT launch an experiment off the inflated aov."
  expected_revenue_impact:
    revenue_at_risk_usd: 0
    basis: "no actionable loss; apparent +28% revenue / +22% aov is a duplication artifact, not real demand"
    direction: none

- scenario_id: S046
