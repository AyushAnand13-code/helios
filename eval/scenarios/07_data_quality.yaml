    segment: {source: "(not set)"}
    rate_multiplier: null
    volume_multiplier: null
    artifact: "NULL spike: a tracking/attribution gap stamps source as '(not set)' for a chunk of otherwise-valid traffic, so sessions are mis-bucketed rather than lost"
    hold_constant: [sessions, users, session_conversion_rate]
  ground_truth:
    root_cause_segment: {source: "(not set)"}
    dominant_effect: none
    mix_rate_interaction: {mix: 0.000, rate: 0.000, interaction: 0.000}
    is_seasonality_decoy: false
    is_data_quality: true
  expected_diagnosis: "NULL-spike data-quality issue, not a behavior change; the apparent ~18% session loss in attributed channels is spurious. Sessions were re-labeled source = '(not set)' by an attribution gap, not actually lost (total sessions and session_conversion_rate are flat). Critic refutes: the missing channel sessions exactly reappear in the '(not set)' bucket."
  expected_recommendation: "Fix the data pipeline: repair source attribution / backfill the '(not set)' partition, exclude it from channel-level diagnosis, and re-run. Do NOT launch an experiment on a channel that did not actually decline."
