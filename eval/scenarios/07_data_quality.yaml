- scenario_id: S048
  title: "Bot/spam traffic spike inflating sessions, diluting conversion"
  bucket: data_quality
  anomaly_type: none
  seed: 1048
  baseline_window: {start: "2020-11-05", end: "2020-11-22"}
  inject_at: "2020-11-23"
  eval_window: {start: "2020-11-23", end: "2020-12-13"}
  target_metric: session_conversion_rate
  funnel_step: {numerator: purchasing_sessions, denominator: sessions}
  anomaly: "Sessions surged ~35% on Referral / desktop while purchasing_sessions held flat, so session_conversion_rate appears to fall ~26% (2.7% -> 2.0%); looks like an unfavorable mix-shift toward low-converting traffic."
  perturbation:
    dimension: [channel_group, device_category]
    segment: {channel_group: "Referral", device_category: "desktop"}
    rate_multiplier: null
    volume_multiplier: null
    artifact: "bot/spam traffic spike: non-human sessions inflate sessions/users on Referral desktop with zero downstream funnel events, diluting session_conversion_rate; junk volume, not a real audience-mix change"
    hold_constant: [purchasing_sessions, transactions, revenue]
  ground_truth:
    root_cause_segment: {channel_group: "Referral", device_category: "desktop"}
    dominant_effect: none
    mix_rate_interaction: {mix: 0.000, rate: 0.000, interaction: 0.000}
    is_seasonality_decoy: false
    is_data_quality: true
  expected_diagnosis: "Bot/spam traffic data-quality issue, not a behavior change; the ~26% session_conversion_rate dilution is spurious. The Referral-desktop session surge has no add_to_cart/begin_checkout/purchasing activity, so it is junk traffic inflating the denominator, not a genuine low-converting mix-shift. Critic refutes: purchasing_sessions, transactions and revenue are unchanged."
  expected_recommendation: "Fix the data pipeline: apply bot filtering / exclude the Referral-desktop spam sessions and re-run. Do NOT launch an experiment to 'recover' a conversion rate that only dropped because of junk traffic."
  expected_revenue_impact:
    revenue_at_risk_usd: 0
    basis: "no actionable loss; the ~26% apparent conversion dilution is bot-inflated sessions in the denominator, real purchases unchanged"
    direction: none

- scenario_id: S049
  title: "Tracking regression: add_to_cart stops firing on Safari"
  bucket: data_quality
  anomaly_type: none
  seed: 1049
  baseline_window: {start: "2020-12-10", end: "2020-12-28"}
  inject_at: "2020-12-29"
  eval_window: {start: "2020-12-29", end: "2021-01-18"}
  target_metric: view_to_cart_rate
  funnel_step: {numerator: add_to_cart_sessions, denominator: view_item_sessions}
  anomaly: "On Safari, view_to_cart_rate appears to collapse ~60% (14% -> 5.5%) starting 2020-12-29 while view_item_sessions, begin_checkout_sessions, purchasing_sessions and revenue on Safari are unchanged."
  perturbation:
    dimension: [browser]
    segment: {browser: "Safari"}
    rate_multiplier: null
    volume_multiplier: null
    artifact: "tracking regression: the add_to_cart event stops firing on Safari (instrumentation bug), so add_to_cart_sessions is under-reported and view_to_cart_rate looks like it collapsed even though downstream checkout/purchase volumes are intact"
    hold_constant: [view_item_sessions, begin_checkout_sessions, purchasing_sessions, revenue]
  ground_truth:
    root_cause_segment: {browser: "Safari"}
    dominant_effect: none
    mix_rate_interaction: {mix: 0.000, rate: 0.000, interaction: 0.000}
    is_seasonality_decoy: false
    is_data_quality: true
  expected_diagnosis: "Tracking-regression data-quality issue, not a behavior change; the ~60% Safari view_to_cart_rate collapse is spurious. add_to_cart stopped firing on Safari, so the numerator is under-counted, yet begin_checkout_sessions and purchasing_sessions on Safari are unchanged - impossible if users had truly stopped adding to cart. Critic refutes: the funnel is internally inconsistent (downstream > implied upstream)."
  expected_recommendation: "Fix the data pipeline / instrumentation: restore the Safari add_to_cart event and backfill, or exclude Safari from view_to_cart_rate diagnosis, then re-run. Do NOT launch an experiment on a cart step that did not actually regress."
  expected_revenue_impact:
    revenue_at_risk_usd: 0
    basis: "no actionable loss; the ~60% apparent view_to_cart_rate drop is a missing add_to_cart event, downstream purchases and revenue intact"
    direction: none

