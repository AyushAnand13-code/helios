- scenario_id: S011
  title: "Desktop->mobile share shift drags aggregate session_conversion_rate (rates flat)"
  bucket: single_segment_mix
  anomaly_type: mix
  seed: 1011
  baseline_window: {start: "2020-12-01", end: "2020-12-20"}
  inject_at: "2020-12-21"
  eval_window: {start: "2020-12-21", end: "2021-01-10"}
  target_metric: session_conversion_rate
  funnel_step: {numerator: purchasing_sessions, denominator: sessions}
  anomaly: "Aggregate session_conversion_rate fell ~9% over the eval window (2.6% -> 2.4%) even though every device's own conversion rate is unchanged; mobile's session share rose from ~46% to ~58%."
  perturbation:
    dimension: [device_category]
    segment: {device_category: "mobile"}
    rate_multiplier: null
    volume_multiplier: 1.6
    hold_constant: [session_conversion_rate, view_to_cart_rate, cart_to_checkout_rate, checkout_to_purchase_rate]
  ground_truth:
    root_cause_segment: {device_category: "mobile"}
    dominant_effect: mix
    mix_rate_interaction: {mix: -0.0018, rate: 0.000, interaction: 0.000}
    is_seasonality_decoy: false
    is_data_quality: false
  expected_diagnosis: "Pure MIX-shift / composition change, NOT a funnel-behavior change. Each device's session_conversion_rate is flat; the aggregate fell only because session share moved toward lower-converting mobile (share ~46% -> ~58%). Per-segment rates reconcile exactly; the apparent ~9% aggregate drop is fully explained by mix. Do NOT 'fix the checkout' - the checkout is working as before."
  expected_recommendation: "Rebalance acquisition: this is a traffic-quality/mix problem, not a UX bug. Audit why mobile share surged (campaign creative, device targeting, or budget reallocation) and shift paid spend back toward higher-converting desktop audiences, or improve mobile traffic targeting. Primary: session_conversion_rate; guardrails: sessions, revenue_per_session. Do NOT run a checkout-step experiment."
  expected_revenue_impact:
    revenue_at_risk_usd: 42000
    basis: "(blended_rate_t0 - blended_rate_t1) * sessions_t1 * aov, where the rate delta is driven entirely by device session-share change; summed over eval_window"
    direction: loss

