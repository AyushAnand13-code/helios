# Helios MCP server registry.
#
# LIVE:
#   stats-mcp    — the only path to math (helios.stats + helios.critic).
#   semantic-mcp — the only path to SQL (helios.semantic over the registry below).
#   Both are stdio wrappers; Claude Code launches them via .mcp.json.
#
# PLANNED (P1b+): warehouse-mcp (BigQuery client: dry_run/run_query/reconcile),
#   then experiment-mcp and report-mcp.
registry: models/semantic/semantic_layer.yaml
servers:
  stats-mcp:
    transport: stdio
    command: python
    args: ["-m", "helios.mcp.stats"]
    description: >-
      Deterministic stats as governed tools: decompose_change (mix/rate/interaction),
      significance_test (two-proportion z-test), critique_decomposition (verify-then-trust).
    tools: [decompose_change, significance_test, critique_decomposition]
  semantic-mcp:
    transport: stdio
    command: python
    args: ["-m", "helios.mcp.semantic"]
    registry: models/semantic/semantic_layer.yaml
    description: >-
      Governed SQL composition from the registry. Never hand-authors SQL (G1); unknown
      names are hard errors (G5).
    tools: [build_query, get_metric, list_metrics, list_dimensions]
