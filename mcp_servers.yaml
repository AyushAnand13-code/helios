# Helios MCP server registry.
#
# LIVE:
#   stats-mcp     — the only path to math (helios.stats + helios.critic).
#   semantic-mcp  — the only path to SQL (helios.semantic over the registry below).
#   warehouse-mcp — the sole BigQuery client (helios.warehouse): dry_run/run_query/reconcile.
#   report-mcp    — diagnosis memory (helios.memory): save_diagnosis/recall_prior + suppression.
#   All stdio wrappers; Claude Code launches them via .mcp.json.
#
# PLANNED: experiment-mcp.
registry: models/semantic/semantic_layer.yaml
servers:
  stats-mcp:
    transport: stdio
    command: python
    args: ["-m", "helios.mcp.stats"]
    description: >-
      Deterministic stats as governed tools: decompose_change (mix/rate/interaction),
      significance_test (two-proportion z-test), critique_decomposition (verify-then-trust).
    tools: [decompose_change, significance_test, critique_decomposition]
  semantic-mcp:
    transport: stdio
    command: python
    args: ["-m", "helios.mcp.semantic"]
    registry: models/semantic/semantic_layer.yaml
    description: >-
      Governed SQL composition from the registry. Never hand-authors SQL (G1); unknown
      names are hard errors (G5).
    tools: [build_query, get_metric, list_metrics, list_dimensions]
  warehouse-mcp:
    transport: stdio
    command: python
    args: ["-m", "helios.mcp.warehouse"]
    description: >-
      Sole BigQuery client. dry_run cost-checks before run_query against a 5 GiB budget
      (G3); reconcile checks aggregates against canonical totals within 0.5% (G4).
    tools: [dry_run, run_query, reconcile]
  report-mcp:
    transport: stdio
    command: python
    args: ["-m", "helios.mcp.report"]
    description: >-
      Diagnosis memory: save_diagnosis/recall_prior + check_suppression (seasonal /
      repeat / refuted / immaterial) so the autonomous run alerts only on NEW findings.
    tools: [save_diagnosis, recall_prior, check_suppression]
