    do_not_use_when:
    - Loyalty / retention must be measured at person grain - cookie churn biases this downward and retention
      belongs to the cohort metrics.
    - Deriving it by subtraction from users at a sliced grain.
    misinterpretations:
    - Equating returning visitors with returning customers (a purchase concept) - most returning users
      do not buy.
    - Assuming new_users + returning_users == users exactly; within-window first+later sessions of one
      cookie break the identity.
    simpsons_paradox_risk: Returning-user share can rise overall while falling in every channel if traffic
      mix shifts toward high-return channels; decompose mix vs rate.
    attribution_pitfalls: A returning user's session channel may differ from their acquisition channel;
      slicing by channel_group reflects the channel of the returning visit, not original acquisition.
    segmentation_pitfalls: 'Non-additive distinct counts: summing returning_users over slices exceeds
      the ungrouped total when a cookie returns via multiple channels/devices.'
  root_cause:
    upstream_drivers:
    - sessions
    downstream_impacts:
