- metric_name: channel_revenue
  label: Channel Revenue
  category: acquisition
  type: sum
  business_definition: Gross order revenue (sum of gross_revenue at order grain) attributed to each acquisition
    channel. Shows which channels generate sales dollars. REQUIRES the channel_group dimension - it is
    meaningless ungrouped (it would just equal total gross_revenue).
  sql_definition: SUM(gross_revenue)
  aggregation_method: sum
  grain: fct_orders
  entity: order
  numerator: null
  denominator: null
  expr: null
  dimensions_supported:
  - channel_group
  - source
  - medium
  - campaign
  - device_category
  - country
  - region
  - is_new_user
  - day
  - week
  - month
  - quarter
  owner: analytics-eng
  version: 1.0.0
  caveats:
  - 'REQUIRED dimension channel_group (or finer source/medium/campaign): without it the metric is just
    total gross_revenue and carries no channel meaning.'
  - Uses *_in_usd revenue only; non-USD twins are never aggregated.
  - Channel is the order's SESSION channel - last-non-direct-style session attribution, NOT multi-touch
    credit; a journey touching several channels assigns all dollars to one.
  - Order-grain gross_revenue reconciles to session-attributed revenue (cluster 01) only at the grand
    total, not necessarily per channel.
  common_mistakes:
  - Reporting channel_revenue without channel_group (returns total revenue, falsely labeled per-channel).
  - Treating single-touch channel attribution as the channel's true incremental contribution.
  - Comparing to session-attributed revenue per channel and expecting an exact tie (different grains/attribution).
  guardrails:
    do_not_use_when:
    - No channel/source dimension is applied (degenerate - use gross_revenue from cluster 01).
    - Incremental or multi-touch channel contribution is the question (this is single-touch).
    misinterpretations:
    - Not profit and not net of refunds unless gross is explicitly net-adjusted - it is gross order revenue.
    - 'Not marketing ROI: there is NO cost side in this dataset.'
    simpsons_paradox_risk: Low for a raw sum, but per-channel revenue mix shifts can mislead trend reads;
      pair with channel_conversion_rate and traffic_share.
    attribution_pitfalls: Single-touch session attribution; plus the traffic_source FIRST-TOUCH gotcha
      - channel_group is derived from session-scoped event_params.source/medium and falls back to event-level
      traffic_source (user first-touch) only when null, so some sessions inherit a first-touch channel
      rather than their true session channel.
    segmentation_pitfalls: Long-tail source/campaign values fragment revenue into noisy slivers; prefer
      channel_group for stable comparison.
  root_cause:
    upstream_drivers:
    - orders
    - aov
    - channel_conversion_rate
    downstream_impacts:
    - revenue
    - gross_revenue
    related_dimensions:
    - channel_group
    - source
    - campaign
    decomposition_path: Split gross_revenue by channel_group; decompose channel revenue change into traffic_share
      (mix) x channel_conversion_rate x aov; drill the channel with the largest rate-driven swing.
  agents:
  - Monitor
  - Decompose
  - Diagnose
  - Narrator
  - Critic
  validation_checks:
  - channel_group dimension present in the query
  - SUM over channels reconciles to total gross_revenue within 0.5%
  - channel_revenue >= 0
  testing:
    dbt_tests:
    - not_null
    - 'dbt_utils.accepted_range: 0..'
    quality_checks:
    - sum across channel_group equals gross_revenue grand total
    anomaly_checks:
    - stl-residual on daily per-channel revenue series, weekly seasonality aware
    reconciliation_checks:
    - per-channel sum reconciles to fct_orders gross_revenue and to total within 0.5%
  freshness_requirements: daily; available <=36h after event_date
- metric_name: channel_conversion_rate
  label: Channel Conversion Rate
  category: acquisition
  type: ratio
  business_definition: 'Session conversion rate computed per acquisition channel: purchasing sessions
    divided by all sessions within the channel. Shows which channels convert efficiently. REQUIRES the
    channel_group dimension.'
  sql_definition: SAFE_DIVIDE(COUNTIF(reached_purchase), COUNT(DISTINCT session_key))
  aggregation_method: ratio
  grain: fct_funnel
  entity: session
  numerator: purchasing_sessions
  denominator: sessions
  expr: null
  dimensions_supported:
  - channel_group
  - source
  - medium
  - campaign
  - device_category
  - operating_system
  - browser
  - country
  - region
  - landing_page
  - is_new_user
  - day
  - week
  - month
  - quarter
  owner: analytics-eng
  version: 1.0.0
  caveats:
  - 'REQUIRED dimension channel_group: ungrouped it collapses to the overall session_conversion_rate (cluster
    03) and loses channel meaning.'
  - Computed SUM(num)/SUM(den) WITHIN each channel - never the average of session-level rates (Simpson's
    defense).
  - Channel = session source via the channel_group macro; subject to the first-touch fallback gotcha.
  - Brand/Direct and Email channels convert high because of intent/loyalty, not channel efficiency - do
    not read as incremental acquisition lift.
  common_mistakes:
  - Comparing channel conversion rates without weighting by traffic_share - a high-rate, low-volume channel
    may move little revenue.
  - Averaging per-session or per-day rates instead of SUM/SUM.
  - Attributing high Direct/Organic conversion to marketing effectiveness (it is largely returning/high-intent
    demand).
  guardrails:
    do_not_use_when:
    - No channel dimension applied (use session_conversion_rate from cluster 03).
    - Channels are compared in isolation from volume - always pair with traffic_share.
    misinterpretations:
    - Not user conversion (it is session-grain); high session conversion can coexist with low user conversion.
    - High rate != high value without volume.
    simpsons_paradox_risk: 'HIGH: blended session_conversion_rate can move purely from channel mix (traffic_share)
      shifting toward low/high-converting channels even with every channel flat. This is the canonical
      decompose_change case - separate mix from rate.'
    attribution_pitfalls: 'traffic_source FIRST-TOUCH gotcha: channel_group prefers session-scoped event_params.source/medium
      and falls back to user first-touch traffic_source only when null; first-touch fallback misattributes
      the converting session''s channel, inflating/deflating the wrong channel.'
    segmentation_pitfalls: Low-volume channels (Affiliates, Email) produce unstable rates; enforce a minimum-sessions
      floor before comparing.
  root_cause:
    upstream_drivers:
    - purchasing_sessions
    - sessions
    downstream_impacts:
    - channel_revenue
    - revenue
    - session_conversion_rate
    - revenue_per_session
    related_dimensions:
    - channel_group
    - device_category
    - landing_page
    decomposition_path: Split session_conversion_rate by channel_group (weights = traffic_share); run
      decompose_change to split blended movement into mix_effect (traffic_share shifts) vs rate_effect
      (in-channel conversion) vs interaction; drill the largest rate-effect channel x device_category.
  agents:
  - Monitor
  - Decompose
  - Diagnose
  - Prescribe
  - Critic
  validation_checks:
  - 0 <= value <= 1
  - channel_group dimension present in the query
  - session-weighted average over channels reconciles to overall session_conversion_rate within 0.5%
  testing:
    dbt_tests:
    - not_null
    - 'dbt_utils.accepted_range: 0..1'
    quality_checks:
    - purchasing_sessions <= sessions within every channel
    anomaly_checks:
    - stl-residual on daily per-channel conversion series, weekly seasonality aware
    reconciliation_checks:
    - SUM(purchasing_sessions)/SUM(sessions) over channels reconciles to overall session_conversion_rate
      within 0.5%
  freshness_requirements: daily; available <=36h after event_date
- metric_name: cac_proxy
  label: CAC Proxy (NOT true CAC)
  category: acquisition
  type: derived
  business_definition: 'A VOLUME-EFFICIENCY PROXY: paid sessions per newly-acquired customer (paid_sessions
    / new_purchasers). It approximates ''how much paid traffic it takes to win one new buyer.'' It is
    explicitly NOT Customer Acquisition Cost - the GA4 export has no spend data, so no dollar CAC can
    be computed here.'
  sql_definition: SAFE_DIVIDE(paid_sessions, new_purchasers)
  aggregation_method: derived
  grain: fct_funnel
  entity: session
  numerator: null
  denominator: null
  expr: SAFE_DIVIDE({paid_sessions}, {new_purchasers})
  dimensions_supported:
  - channel_group
  - source
  - medium
  - campaign
  - device_category
  - country
  - day
  - week
  - month
  - quarter
  owner: analytics-eng
  version: 1.0.0
  caveats:
  - NOT TRUE CAC. True CAC = marketing_spend / new_customers. This dataset (GA4 obfuscated sample) contains
    NO cost/spend column, so a dollar CAC is impossible here.
  - cac_proxy is a unitless RATIO of paid sessions to new buyers - a volume-efficiency proxy, not money.
    A lower value means fewer paid sessions per new customer (more efficient), not cheaper acquisition
    in dollars.
  - Real CAC requires an EXTERNAL marketing-spend table joined by channel/campaign/date (deferred; Bible
    roadmap). Until then, never present cac_proxy as CAC, ROAS, or payback.
  - paid_sessions counts sessions in paid channels (Paid Search, Paid Social, Display); new_purchasers
    counts distinct NEW users who purchased - the two have different denominators of meaning, so the proxy
    is directional, not a literal per-customer cost.
  - Single-touch attribution plus the first-touch fallback gotcha biases which sessions/customers are
    credited to 'paid'.
  common_mistakes:
  - Calling it CAC, multiplying by a CPC to fake a dollar cost, or feeding it into ROAS/payback - all
    invalid without real spend.
  - Comparing cac_proxy across periods without noting paid-channel mix shifts (Display vs Paid Search
    have very different session-to-customer ratios).
  - Forgetting new_purchasers is NEW users only; existing-customer purchases driven by paid traffic are
    not in the denominator.
  guardrails:
    do_not_use_when:
    - Any dollar-denominated acquisition-cost, ROAS, LTV:CAC, or payback question is asked - there is
      no cost data; defer to an external spend table.
    - new_purchasers is very small (proxy explodes / is unstable).
    - Organic-only or all-channel scope (paid_sessions would be partial or the proxy meaningless).
    misinterpretations:
    - It is NOT dollars. It is paid sessions per new customer.
    - Lower is 'more efficient volume', but cheaper-in-dollars cannot be inferred.
    simpsons_paradox_risk: Paid-channel mix shifts (more cheap-converting Paid Search vs more Display)
      move the blended proxy without any real efficiency change; decompose by paid channel before concluding.
    attribution_pitfalls: Paid-channel membership and new-customer credit both depend on session-channel
      attribution and the traffic_source first-touch fallback; misattribution distorts both numerator
      and denominator.
    segmentation_pitfalls: Per-campaign new_purchasers is tiny, making the proxy extremely noisy; aggregate
      to channel_group.
  root_cause:
    upstream_drivers:
    - paid_sessions
    - new_purchasers
    downstream_impacts:
    - channel_conversion_rate
    - channel_revenue
    related_dimensions:
    - channel_group
    - campaign
    - device_category
    decomposition_path: 'Split by paid channel_group x campaign; inspect paid_sessions (numerator) vs
      new_purchasers (denominator) separately; pair with channel_conversion_rate to see whether efficiency
      moved from volume or from conversion. NOTE the honest ceiling: without spend, stop at volume efficiency.'
  agents:
  - Diagnose
  - Prescribe
  - Critic
  validation_checks:
  - cac_proxy >= 0
  - rendered with the explicit 'NOT true CAC' label and a no-cost-data caveat
  - reconciles to warehouse-mcp.reconcile within 0.5% (paid_sessions and new_purchasers legs)
  testing:
    dbt_tests:
    - not_null
    quality_checks:
    - paid_sessions restricted to Paid Search / Paid Social / Display only
    - new_purchasers are distinct NEW users with a purchase
    anomaly_checks:
    - stl-residual on weekly proxy series, weekly seasonality aware (flag mix-driven swings)
    reconciliation_checks:
    - paid_sessions and new_purchasers each reconcile to additive recompute within 0.5%
  freshness_requirements: daily; available <=36h after event_date
- metric_name: traffic_share
  label: Traffic Share (mix weight w_i)
  category: acquisition
  type: derived
  business_definition: 'Each channel''s share of total sessions (sessions in segment / total sessions
    across all segments). This IS the mix weight w_i in the core decomposition identity dR = SUM(dw_i*r_i)
    + SUM(w_i*dr_i) + SUM(dw_i*dr_i): it quantifies how traffic COMPOSITION (not behavior) is distributed
    and how it shifts over time.'
  sql_definition: SAFE_DIVIDE(COUNT(DISTINCT session_key), SUM(COUNT(DISTINCT session_key)) OVER ())
  aggregation_method: window
  grain: fct_funnel
  entity: session
  numerator: null
  denominator: null
  expr: SAFE_DIVIDE(sessions, SUM(sessions) OVER ())
  dimensions_supported:
  - channel_group
  - source
  - medium
  - campaign
  - device_category
  - operating_system
  - browser
  - country
  - region
  - landing_page
  - is_new_user
  - session_number_bucket
  - day
  - week
  - month
  - quarter
  owner: analytics-eng
  version: 1.0.0
  caveats:
  - 'WINDOW metric: the denominator is the SUM of sessions over the OVER() partition (the whole result
    set / period). The share depends entirely on which segments and window are in scope - changing the
    grouping or date range changes every share.'
  - This is the mix weight w_i fed to stats-mcp.decompose_change. Delta(traffic_share) over t0->t1 is
    exactly dw_i, the MIX-EFFECT driver. A blended-rate move with no behavior change is a pure mix-shift
    story told by traffic_share.
  - Shares of all segments in scope sum to 1 (100%); a single segment's share is only interpretable against
    that total.
  - Session-grain shares; subject to the channel first-touch fallback gotcha when sliced by channel_group/source.
  common_mistakes:
  - Comparing traffic_share across queries with different segment sets or windows (the denominator differs,
    so shares are not comparable).
  - Reading a rising share as growth when total sessions fell (share can rise while absolute sessions
    drop).
  - Ignoring traffic_share when interpreting a blended-rate change - mix shift is the most common false
    'rate' signal.
  guardrails:
    do_not_use_when:
    - Absolute volume is the question - use the sessions count, not its share.
    - Segments are filtered to a subset (shares no longer sum to a meaningful 100%).
    misinterpretations:
    - Share is relative, not absolute; a higher share does not imply more sessions.
    - It describes COMPOSITION (mix), never conversion or behavior (rate).
    simpsons_paradox_risk: 'traffic_share IS the weight that CREATES Simpson''s paradox: shifting weight
      toward low-converting segments lowers the blended rate even when every segment is flat. decompose_change
      uses traffic_share to quantify and remove exactly this mix_effect.'
    attribution_pitfalls: When sliced by channel_group/source, share inherits the traffic_source first-touch
      fallback gotcha; misattributed sessions shift the apparent mix.
    segmentation_pitfalls: Long-tail segments produce many tiny shares; bucket the long tail (e.g. to
      channel_group) so the mix decomposition is stable and interpretable.
  root_cause:
    upstream_drivers:
    - sessions
    downstream_impacts:
    - channel_conversion_rate
    - session_conversion_rate
    - revenue_per_session
    - channel_revenue
    related_dimensions:
    - channel_group
    - device_category
    - landing_page
    decomposition_path: traffic_share = w_i. In decompose_change, Delta(traffic_share) drives mix_effect
      = SUM(dw_i*r_i(t0)); pair with each segment's rate (r_i) to attribute a blended-rate move to mix
      vs rate vs interaction; drill rate-effects, discount mix-effects as composition artifacts.
  agents:
  - Decompose
  - Diagnose
  - Critic
  - Narrator
  validation_checks:
  - 0 <= value <= 1
  - shares across all in-scope segments sum to 1.0 within 0.5%
  - reconciles to warehouse-mcp.reconcile within 0.5%
  testing:
    dbt_tests:
    - 'dbt_utils.accepted_range: 0..1'
    quality_checks:
    - SUM(traffic_share) over the partition equals 1.0 within tolerance
    - window partition (OVER()) matches the query's segment scope
    anomaly_checks:
    - stl-residual on daily per-segment share series, weekly seasonality aware (mix-shift detection)
    reconciliation_checks:
    - share numerator (sessions) and denominator (total sessions) reconcile to fct_funnel within 0.5%
  freshness_requirements: daily; available <=36h after event_date
- metric_name: paid_sessions
  label: Paid Sessions
  category: supporting
  type: count
  business_definition: 'Supporting measure: count of sessions in PAID acquisition channels (channel_group
    in Paid Search, Paid Social, Display). Numerator of cac_proxy and the volume base for paid-channel
    efficiency.'
  sql_definition: COUNTIF(channel_group IN ('Paid Search','Paid Social','Display'))
  aggregation_method: countif
  grain: fct_funnel
  entity: session
  numerator: null
  denominator: null
  expr: null
  dimensions_supported:
