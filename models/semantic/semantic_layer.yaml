  - week
  - month
  - quarter
  owner: analytics-eng
  version: 1.0.0
  caveats:
  - Distinct BUYERS (user_pseudo_id with >=1 order), not orders and not purchasing_sessions; a buyer with
    multiple sessions/orders counts once.
  - 'Cookie-based buyer identity: a buyer on two cookies counts twice.'
  - 'Window-bounded: only buyers whose order falls inside the window.'
  common_mistakes:
  - Confusing purchasers (distinct buyers) with orders/transactions (order count) or with purchasing_sessions
    (session count).
  - Using purchasing_users (cluster 03, session-funnel grain) interchangeably - purchasers is order-grain
    and counts only confirmed transactions.
  guardrails:
    do_not_use_when:
