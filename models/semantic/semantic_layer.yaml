    misinterpretations:
    - Not the same as purchasing_sessions; one buyer can have many purchasing sessions.
    simpsons_paradox_risk: As a denominator it weights repeat_purchase_rate; aggregate with its numerator.
    attribution_pitfalls: If sliced by channel, the channel is the order's session channel (first-touch
      gotcha).
    segmentation_pitfalls: Small per-segment buyer counts in a 3-month sample.
  root_cause:
