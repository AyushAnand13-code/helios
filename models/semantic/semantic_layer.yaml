    (>=1 distinct transaction_id). Denominator of repeat_purchase_rate.'
  sql_definition: COUNT(DISTINCT IF(user_order_count >= 1, buyer_user_id, NULL))
  aggregation_method: count_distinct
  grain: fct_orders
