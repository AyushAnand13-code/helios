  label: View-to-Cart Rate
  category: conversion
  type: ratio
  business_definition: Of the sessions that reached the view_item stage, the share that went on to reach
    add_to_cart. Measures product-page-to-cart intent. Computed as SUM(add_to_cart_sessions)/SUM(view_item_sessions)
    after grouping so that segment volumes are correctly weighted (never an average of per-segment rates).
  sql_definition: SAFE_DIVIDE(COUNTIF(reached_add_to_cart), COUNTIF(reached_view_item))
  aggregation_method: ratio
  grain: fct_funnel
  entity: session
  numerator: add_to_cart_sessions
  denominator: view_item_sessions
  expr: null
  dimensions_supported:
  - device_category
  - operating_system
  - browser
  - country
  - region
  - channel_group
  - source
  - medium
  - campaign
  - landing_page
  - is_new_user
  - session_number_bucket
  - day
  - week
  - month
  - quarter
  owner: analytics-eng
  version: 1.0.0
  caveats:
  - Always in [0,1] because reached_add_to_cart implies reached_view_item (monotonic flags).
  - Compute as SUM(num)/SUM(den) after grouping, never AVG of row/segment rates — averaging un-weights
    large segments and invites Simpson's paradox.
  - 'Session-scoped intent, not user intent: a user browsing across many sessions is multiple denominators.'
  - SAFE_DIVIDE returns NULL when there are zero view_item_sessions; treat NULL cells as 'no data', not
    zero.
  common_mistakes:
  - Averaging device-level rates to get the overall rate (mix-weight error).
  - Comparing blended rate across periods when traffic mix shifted — a flat per-segment rate can still
    move the blend (Simpson's).
  - Reading it as add-to-cart of all sessions; the denominator is view_item_sessions, not sessions.
  guardrails:
    do_not_use_when:
    - Comparing two periods or segments whose channel_group/device_category mix differs materially — decompose
      mix vs rate first.
    - Denominator (view_item_sessions) is below the minimum-volume gate; the rate is statistically unstable.
    misinterpretations:
    - Treating a blended-rate movement as a UX/product change when it is a traffic-mix change.
    - Assuming higher view-to-cart always lifts revenue; downstream cart->checkout->purchase can offset
      it.
    simpsons_paradox_risk: HIGH. Mobile typically has lower view-to-cart and far higher traffic share;
      a mix shift toward mobile drags the blended rate down even if every device's rate rose. ALWAYS decompose
      by channel_group x device_category (mix vs rate vs interaction) before drawing a conclusion.
    attribution_pitfalls: Channel is the viewing session's last-non-direct source; cart-add intent generated
      by an earlier assisting channel is mis-credited.
    segmentation_pitfalls: landing_page and campaign cells go sparse fast; enforce a minimum view_item_sessions
      threshold and prefer wider windows for low-volume segments.
  root_cause:
    upstream_drivers:
