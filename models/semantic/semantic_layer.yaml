    - view_item_sessions
    downstream_impacts:
    - session_conversion_rate
    - cart_to_checkout_rate
    - revenue
    - revenue_per_session
    related_dimensions:
    - device_category
    - channel_group
    - landing_page
    - item_category
    decomposition_path: Split by channel_group x device_category; run decompose_change to separate mix
      effect (traffic re-weighting) from rate effect (within-segment intent) from interaction; drill the
      largest rate-effect cell, then inspect landing_page and item_category inside it.
  agents:
  - Monitor
  - Decompose
  - Diagnose
  - Prescribe
  - Critic
  - Narrator
  validation_checks:
  - 0 <= value <= 1
  - value = SUM(add_to_cart_sessions)/SUM(view_item_sessions) per grouped cell (mix-weighted, not averaged)
  - reconciles to warehouse-mcp.reconcile within 0.5%
  testing:
    dbt_tests:
    - not_null
    - 'dbt_utils.accepted_range: {min_value: 0, max_value: 1, inclusive: true}'
    quality_checks:
    - view_to_cart_rate <= 1 for every cell (monotonic-flag guarantee)
    - blended rate equals SUM(num)/SUM(den), validated against per-cell recompute
    anomaly_checks:
    - stl-residual on daily series, weekly seasonality aware
    reconciliation_checks:
    - semantic vs fct_daily_funnel additive recompute of SUM(add_to_cart_sessions)/SUM(view_item_sessions)
      within 0.5%
  freshness_requirements: daily; available <=36h after event_date
