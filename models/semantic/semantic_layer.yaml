    - revenue_per_user
    - user_conversion_rate
    related_dimensions:
    - channel_group
    - device_category
    - country
    decomposition_path: Split by channel_group x device_category; compare returning-share trend; run decompose_change
      to isolate whether returning growth is mix (more high-return channels) or rate (better retention
      within channel).
  agents:
  - Monitor
  - Decompose
  - Diagnose
  - Critic
  validation_checks:
  - value >= 0 and integer
  - returning_users <= users at every grain
  - reconciles to warehouse-mcp.reconcile within 0.5%
  testing:
    dbt_tests:
    - not_null
    - 'dbt_utils.accepted_range: {min_value: 0}'
    quality_checks:
    - returning_users <= users at every grain
    - every contributing row has is_new_user = FALSE (ga_session_number > 1)
    anomaly_checks:
    - stl-residual on daily returning-users series, weekly seasonality aware
    reconciliation_checks:
    - semantic returning_users vs fct_daily_funnel recompute within 0.5%
  freshness_requirements: daily; available <=36h after event_date
- metric_name: sessions
  label: Sessions
  category: traffic
  type: count
  business_definition: Distinct visits in the window. A session is one (user_pseudo_id, ga_session_id)
    pair, deduped via session_key. The base volume on which the entire funnel and every rate metric is
    built.
  sql_definition: COUNT(DISTINCT session_key)
  aggregation_method: count_distinct
  grain: fct_funnel
  entity: session
  numerator: null
  denominator: null
  expr: null
  dimensions_supported:
  - device_category
  - operating_system
  - browser
  - country
  - region
  - channel_group
  - source
  - medium
  - campaign
  - landing_page
  - is_new_user
  - session_number_bucket
  - day
  - week
  - month
  - quarter
  owner: analytics-eng
  version: 1.0.0
  caveats:
  - session_key = TO_HEX(MD5(CONCAT(user_pseudo_id,'-',CAST(ga_session_id AS STRING)))). A GA4 session
    times out after 30 min of inactivity and at UTC midnight, so a single visit crossing midnight splits
    into two sessions.
  - 'sessions is the MIX WEIGHT w_i for decompose_change: it is the denominator of session_conversion_rate,
    the funnel step rates, engagement_rate, and revenue_per_session. Any movement in sessions reweights
    every downstream rate even when per-session behaviour is unchanged - this is the central Simpson''s-paradox
    lever.'
  - Distinct count is non-additive across time and segments; recompute COUNT(DISTINCT session_key) at
    the requested grain rather than summing slices.
  - 'Cookie-derived: bot/spam traffic and cookie churn add spurious sessions that dilute rate denominators
    (see engagement_rate guardrails).'
  common_mistakes:
  - Summing daily distinct sessions to get a period total - session_key is unique per day-event but COUNT(DISTINCT)
    must be recomputed at the period grain.
  - Comparing a rate across segments without holding the sessions mix constant - shifts in the sessions
    weight w_i drive apparent rate changes (mix effect).
  guardrails:
    do_not_use_when:
    - A person-level or visit-quality measure is needed - sessions counts visits including bot/low-quality
      traffic.
    - Reconstructing a period total by summing per-slice distinct counts.
    misinterpretations:
    - Reading sessions as users (a user has multiple sessions) or as pageviews (a session has many events).
    - Assuming sessions are independent across the funnel - reached_* flags are computed within the same
      session.
    simpsons_paradox_risk: 'PRIMARY weight in every rate metric: because rates are SUM(num)/SUM(den) over
      sessions, a shift in the sessions distribution across segments can reverse the direction of an aggregate
      rate vs every segment rate. Always decompose mix (sessions weight) vs rate.'
    attribution_pitfalls: Sessions are attributed to a single session-scoped channel_group/source/medium;
      a multi-touch journey is split into independent sessions, so channel-sliced sessions over-represent
      re-entry channels.
    segmentation_pitfalls: 'Non-additive: sum of distinct sessions over slices >= the ungrouped total
      when sessions appear under multiple values is impossible per session, but day-rollups still require
      recompute, not addition.'
  root_cause:
    upstream_drivers:
    - users
    - new_users
    - returning_users
    downstream_impacts:
    - session_conversion_rate
    - engagement_rate
    - view_to_cart_rate
    - cart_to_checkout_rate
    - checkout_to_purchase_rate
    - revenue_per_session
    - traffic_share
    - view_item_sessions
    related_dimensions:
    - channel_group
    - device_category
    - landing_page
    decomposition_path: Split by channel_group x device_category; sessions IS the mix weight w_i, so decompose_change
      attributes any aggregate-rate move to mix (sessions reweighting) vs rate (per-session behaviour)
      vs interaction; drill the largest mix or rate contributor.
  agents:
  - Monitor
  - Decompose
  - Diagnose
  - Critic
  - Narrator
  validation_checks:
  - value >= 0 and integer
  - sessions >= users at every grain (a user has one or more sessions)
  - sessions >= view_item_sessions >= add_to_cart_sessions >= begin_checkout_sessions >= purchasing_sessions
    (monotonic funnel)
  - reconciles to warehouse-mcp.reconcile within 0.5%
  testing:
    dbt_tests:
    - not_null
    - unique (session_key on fct_funnel)
    - 'dbt_utils.accepted_range: {min_value: 0}'
    quality_checks:
    - sessions >= users at every grain
    - sessions >= each reached_* session count (funnel monotonicity)
    anomaly_checks:
    - stl-residual on daily sessions series, weekly seasonality aware; spike-detect for bot floods
    reconciliation_checks:
    - semantic sessions vs fct_daily_funnel additive recompute within 0.5%
  freshness_requirements: daily; available <=36h after event_date
- metric_name: engaged_sessions
  label: Engaged Sessions
  category: traffic
  type: count
  business_definition: 'Sessions that met the GA4 engaged-session bar: the session lasted 10+ seconds
    OR had a conversion/multiple pageviews, captured as session_engaged=''1'' OR engagement_time_msec
    >= 10000. A proxy for non-bounce, attention-bearing visits.'
  sql_definition: COUNTIF(engaged_session)
  aggregation_method: countif
  grain: fct_sessions
  entity: session
  numerator: null
  denominator: null
  expr: null
  dimensions_supported:
  - device_category
  - operating_system
  - browser
  - country
  - region
  - channel_group
  - source
  - medium
  - campaign
  - landing_page
  - is_new_user
  - session_number_bucket
  - day
  - week
  - month
  - quarter
  owner: analytics-eng
  version: 1.0.0
  caveats:
  - engaged_session is the boolean flag (session_engaged='1' OR engagement_time_msec >= 10000) materialized
    on fct_sessions; the 10s / engagement-time thresholds are GA4 platform defaults, not Helios choices.
  - 'Engagement is NOT conversion: an engaged session need not view a product or purchase. Do not read
    engaged_sessions as funnel progress.'
  - engagement_time_msec can be under-reported when the GA4 SDK loses the page-visibility/heartbeat signal
    (background tabs, fast navigations), so engaged_sessions is a lower bound on genuine attention.
  - Lives on the fct_sessions grain (1 row/session), the same session universe as fct_funnel; the two
    reconcile at sessions.
  common_mistakes:
  - Equating engaged_sessions with quality leads or with view_item_sessions - engagement and funnel entry
    are independent.
  - Counting engaged_sessions with COUNT(DISTINCT) - it is a COUNTIF over the (already distinct) session
    rows on fct_sessions.
  guardrails:
    do_not_use_when:
    - A conversion or revenue-intent measure is required - use funnel/conversion metrics instead.
    - Comparing across periods where the GA4 engagement_time instrumentation changed.
    misinterpretations:
    - Reading 'engaged' as 'converted' or 'qualified'.
    - Assuming a bounce in GA4 (the complement) means zero value - a fast task completion can be a non-engaged
      session.
    simpsons_paradox_risk: Engaged-session counts shift with the sessions mix; a channel with naturally
      long sessions raises the aggregate even if no per-channel engagement improved.
    attribution_pitfalls: Engaged sessions inherit session-scoped channel attribution; high-engagement
      channels (e.g. Organic Search) over-index when sliced by channel_group.
    segmentation_pitfalls: Always pair engaged_sessions with sessions at the same slice so the engagement_rate
      is interpretable; a raw engaged-session count without its denominator hides mix effects.
  root_cause:
    upstream_drivers:
    - sessions
    downstream_impacts:
    - engagement_rate
    related_dimensions:
    - channel_group
    - device_category
    - landing_page
    decomposition_path: Split by channel_group x device_category; compare engaged_sessions against sessions
      to isolate whether a move is volume (more sessions) or quality (higher engaged share); feed engagement_rate
      decompose_change.
  agents:
  - Monitor
  - Decompose
  - Diagnose
  - Critic
  validation_checks:
  - value >= 0 and integer
  - engaged_sessions <= sessions at every grain
  - reconciles to warehouse-mcp.reconcile within 0.5%
  testing:
    dbt_tests:
    - not_null
    - 'dbt_utils.accepted_range: {min_value: 0}'
    quality_checks:
    - engaged_sessions <= sessions at every grain
    - engaged_session flag is boolean and equals (session_engaged='1' OR engagement_time_msec >= 10000)
    anomaly_checks:
    - stl-residual on daily engaged-sessions series, weekly seasonality aware
    reconciliation_checks:
    - fct_sessions session universe reconciles to fct_funnel sessions within 0.5%
  freshness_requirements: daily; available <=36h after event_date
- metric_name: engagement_rate
  label: Engagement Rate
  category: traffic
  type: ratio
  business_definition: 'Share of sessions that were engaged: engaged_sessions / sessions. GA4''s primary
    session-quality signal; the complement (1 - engagement_rate) is the bounce rate.'
  sql_definition: SAFE_DIVIDE(COUNTIF(engaged_session), COUNT(DISTINCT session_key))
  aggregation_method: ratio
  grain: fct_sessions
  entity: session
  numerator: engaged_sessions
  denominator: sessions
  expr: null
  dimensions_supported:
  - device_category
  - operating_system
  - browser
  - country
  - region
  - channel_group
  - source
  - medium
  - campaign
  - landing_page
  - is_new_user
  - session_number_bucket
  - day
  - week
  - month
  - quarter
  owner: analytics-eng
  version: 1.0.0
  caveats:
  - Computed as SUM(engaged_sessions)/SUM(sessions) AFTER grouping (never the average of per-row rates)
    - the Simpson's-paradox defense.
  - 'BOT / SPAM TRAFFIC DILUTES THE RATE: invalid traffic adds non-engaged sessions to the denominator,
    depressing engagement_rate even when human engagement is unchanged. A sudden engagement_rate drop
    is often a bot/referral-spam influx, not a UX regression - confirm against the sessions spike before
    diagnosing experience.'
  - 'Engagement is NOT conversion: a high engagement_rate does not imply purchase intent.'
  - Thresholds (10s / engagement-time) are GA4 platform defaults; a GA4 config change shifts the rate
    without any real behaviour change.
  common_mistakes:
  - Averaging daily engagement_rate values instead of recomputing SUM(num)/SUM(den) over the period.
  - Interpreting a rate fall as a content problem when it is denominator dilution from bot or low-quality
    paid traffic.
  - Comparing engagement_rate across channels without noting that paid/display channels carry more non-engaged
    and bot sessions.
  guardrails:
    do_not_use_when:
    - Sessions are known to contain unfiltered bot/spam traffic - filter or segment it out first, or the
      rate is meaningless.
    - Periods straddle a GA4 engagement-time or filter configuration change.
    - As a conversion or revenue proxy - it measures attention, not intent.
    misinterpretations:
    - Reading engagement_rate as conversion rate or as a guarantee of funnel progress.
    - Treating 1 - engagement_rate (bounce) as wasted traffic - quick task completions can be legitimate
      non-engaged sessions.
    simpsons_paradox_risk: 'HIGH: engagement_rate is a sessions-weighted ratio, so a shift in the sessions
      mix across channels/devices can move the aggregate opposite to every segment. Always decompose mix
      (sessions weight w_i) vs rate (per-segment engaged share) vs interaction.'
    attribution_pitfalls: Channel-sliced engagement_rate reflects session-scoped attribution; re-entry/branded
      sessions inflate engaged share for Direct and Organic Search.
    segmentation_pitfalls: Low-volume slices give noisy rates; suppress or widen the window below a minimum
      sessions threshold before acting, and always report numerator and denominator alongside the rate.
  root_cause:
    upstream_drivers:
    - engaged_sessions
    - sessions
    downstream_impacts:
    - session_conversion_rate
    - revenue_per_session
    related_dimensions:
    - channel_group
    - device_category
    - landing_page
    decomposition_path: Split by channel_group x device_category; run decompose_change (mix vs rate vs
      interaction) using sessions as the weight w_i; first rule out bot/spam denominator dilution (check
      the sessions spike) before attributing to UX or landing-page quality; drill the largest rate-effect.
  agents:
  - Monitor
  - Decompose
  - Diagnose
  - Critic
  - Narrator
  validation_checks:
  - 0 <= value <= 1
  - engagement_rate = engaged_sessions / sessions reconciles to its component metrics
  - reconciles to warehouse-mcp.reconcile within 0.5%
  testing:
    dbt_tests:
    - not_null
    - 'dbt_utils.accepted_range: {min_value: 0, max_value: 1}'
    quality_checks:
    - 0 <= engagement_rate <= 1 at every grain
    - numerator engaged_sessions <= denominator sessions at every grain
    - engaged_sessions and sessions resolve to the same fct_sessions session universe
    anomaly_checks:
    - stl-residual on daily engagement_rate series, weekly seasonality aware; cross-flag against a sessions
      spike to separate bot dilution from genuine quality change
    reconciliation_checks:
    - semantic engagement_rate vs fct_daily_funnel/fct_sessions additive recompute (SUM num / SUM den)
      within 0.5%
  freshness_requirements: daily; available <=36h after event_date
- metric_name: view_item_sessions
  label: Product Views
  category: funnel
  type: count
  business_definition: Number of sessions that reached the view_item step — i.e. sessions in which the
    user viewed at least one product detail page. Because reached_view_item is max-downstream monotonic,
    this also includes every session that progressed further (added to cart, checked out, or purchased).
    This is the TOP of the engaged purchase funnel and the denominator of view_to_cart_rate.
  sql_definition: COUNTIF(reached_view_item)
  aggregation_method: countif
  grain: fct_funnel
  entity: session
  numerator: null
  denominator: null
  expr: null
  dimensions_supported:
  - device_category
  - operating_system
  - browser
  - country
  - region
  - channel_group
  - source
  - medium
  - campaign
  - landing_page
  - is_new_user
  - session_number_bucket
  - day
  - week
  - month
  - quarter
  owner: analytics-eng
  version: 1.0.0
  caveats:
  - 'Session-grain, NOT event-grain: a session that views 5 products counts once. For per-product view
    volume use the item-level metrics in cluster 05 (item_views / item_view_sessions).'
  - 'Monotonic inclusion: this count contains all add_to_cart, begin_checkout and purchasing sessions.
    It is a CUMULATIVE stage reach, not the population of sessions that stopped at view_item.'
  - Bot/internal traffic is not separately excluded here; rely on upstream fct_funnel filtering.
  common_mistakes:
  - Treating it as 'sessions that ONLY viewed a product'. It includes deeper-funnel sessions because reached_*
    is max-downstream.
  - Summing view_item_sessions across overlapping date ranges and double-counting sessions; always count
    distinct within a single grouped window.
  - Using it as a product-popularity metric — it is session reach of the view_item STAGE, not product-level
    views.
  guardrails:
    do_not_use_when:
    - You need the count of sessions whose deepest step was exactly view_item (use view_item_sessions
      - add_to_cart_sessions for the 'stalled at view' population).
    - You need per-product view demand (use cluster 05 item metrics).
    misinterpretations:
    - Interpreting a drop as fewer product views when it is actually fewer engaged sessions overall —
      always normalize against sessions.
    simpsons_paradox_risk: As a raw count this metric is additive and not itself rate-distorted, but feeding
      it as a denominator into view_to_cart_rate inherits Simpson's risk when traffic mix shifts.
    attribution_pitfalls: channel_group/source/medium reflect SESSION-level attribution (last non-direct
      in GA4), not user-journey attribution; a session's channel is not the user's acquisition channel.
    segmentation_pitfalls: landing_page slices can be noisy for low-volume pages; require a minimum session
      threshold before reading rate metrics built on this.
  root_cause:
    upstream_drivers:
    - sessions
    - engaged_sessions
    downstream_impacts:
    - add_to_cart_sessions
    - view_to_cart_rate
    - session_conversion_rate
    - revenue
    related_dimensions:
    - channel_group
    - device_category
    - landing_page
    - item_category
    decomposition_path: Split by channel_group x device_category; compare view_item_sessions against sessions
      to isolate whether a change is a traffic-volume effect or an engagement (reach-to-view) effect,
      then drill landing_page within the largest-moving cell.
  agents:
  - Monitor
  - Decompose
  - Diagnose
  - Critic
  validation_checks:
  - value >= 0 (non-negative count)
  - value <= sessions for every grouping cell (cannot exceed total sessions)
  - value >= add_to_cart_sessions for every cell (monotonic funnel)
  - reconciles to warehouse-mcp.reconcile within 0.5%
  testing:
    dbt_tests:
    - not_null
    - 'dbt_utils.accepted_range: {min_value: 0, inclusive: true}'
    quality_checks:
    - view_item_sessions <= sessions per day (funnel monotonicity at stage 1)
    - view_item_sessions >= add_to_cart_sessions per day
    anomaly_checks:
    - stl-residual on daily series, weekly seasonality aware
    reconciliation_checks:
    - semantic vs fct_daily_funnel additive recompute of COUNTIF(reached_view_item) within 0.5%
  freshness_requirements: daily; available <=36h after event_date
