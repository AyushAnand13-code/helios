  guardrails:
    do_not_use_when:
    - The cohort is <30 days old (value not yet observable; exclude).
    misinterpretations:
    - Cumulative BY day 30, not active-on-day-30.
    simpsons_paradox_risk: Numerator leg; censoring bias dominates Simpson's risk here.
    attribution_pitfalls: Cohort channel is first-touch; mature cohorts are holiday-skewed.
    segmentation_pitfalls: Mature-cohort set is tiny; deep slicing yields empty cells.
  root_cause:
    upstream_drivers:
    - retained_users_d7
    - cohort_size
    downstream_impacts:
    - day_30_retention
    related_dimensions:
    - channel_group
    - device_category
    - country
    decomposition_path: Numerator leg of day_30_retention; only analyzable on the few mature cohorts,
      with a censoring caveat.
  agents:
  - Diagnose
  - Critic
  validation_checks:
  - 0 <= retained_users_d30 <= retained_users_d7 <= cohort_size
  - only counted final for cohorts >=30 days old
  testing:
    dbt_tests:
    - not_null
    - 'dbt_utils.accepted_range: 0..'
    quality_checks:
    - retained_users_d30 <= retained_users_d7 per cohort row
    - censored cohorts excluded from any published d30 rate
    anomaly_checks:
    - level-check against mature-cohort baseline only (too few points for stl-residual trend)
    reconciliation_checks:
    - additive recompute of distinct day-30 returners over MATURE cohorts matches within 0.5%
  freshness_requirements: daily; FINAL only once cohort is >=30 days past first touch - rarely reached
    within this sample
