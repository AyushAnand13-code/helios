- metric_name: session_conversion_rate
  label: Session Conversion Rate
  category: conversion
  type: ratio
  business_definition: Of all sessions, the share that reached a purchase — the end-to-end per-visit conversion
    rate. Computed as SUM(purchasing_sessions)/SUM(sessions) after grouping. This is the headline funnel
    KPI and a primary experiment metric; it equals the product of the three step rates (view_to_cart x
    cart_to_checkout x checkout_to_purchase) scaled by the view_item reach rate.
  sql_definition: SAFE_DIVIDE(COUNTIF(reached_purchase), COUNT(DISTINCT session_key))
  aggregation_method: ratio
  grain: fct_funnel
  entity: session
  numerator: purchasing_sessions
  denominator: sessions
  expr: null
  dimensions_supported:
  - device_category
  - operating_system
  - browser
  - country
  - region
  - channel_group
  - source
  - medium
  - campaign
  - landing_page
  - is_new_user
  - session_number_bucket
  - day
  - week
  - month
  - quarter
  owner: analytics-eng
  version: 1.0.0
  caveats:
  - 'Always in [0,1]: purchasing_sessions <= sessions by construction.'
  - 'PER-VISIT, not per-person: denominator is sessions. Differs from user_conversion_rate whenever users
    have multiple sessions (the norm). A user who visits 5 times and buys once contributes 1/5 here but
    counts as a converter in user_conversion_rate.'
  - SUM(num)/SUM(den) after grouping; never average per-segment rates.
  - SAFE_DIVIDE returns NULL on zero sessions; NULL = no data, not 0.
  common_mistakes:
  - Substituting it for user_conversion_rate or comparing the two directly — they answer different questions.
  - Averaging device/channel rates instead of mix-weighting.
  - Attributing a blended-rate change to product/UX when it is a traffic-mix change (Simpson's).
  guardrails:
    do_not_use_when:
    - You need per-PERSON conversion or de-duplicated buyers (use user_conversion_rate).
    - Compared groups differ in channel_group/device_category mix — decompose first.
    - Sessions in a cell are below the minimum-volume gate.
    misinterpretations:
    - Reading session conversion as 'percent of customers who bought' (it is percent of VISITS).
    - Assuming a flat overall rate means nothing changed — offsetting segment moves can cancel in the
      blend.
    simpsons_paradox_risk: HIGH — this is the canonical example. Mobile dominates session volume but converts
      far below desktop; a shift toward mobile traffic lowers the blended session_conversion_rate even
      when every device's rate is flat or rising. The Decompose and Critic agents MUST split by channel_group
      x device_category (mix vs rate vs interaction) before any conclusion.
    attribution_pitfalls: Per-session last-non-direct attribution credits the converting session's channel;
      multi-session journeys mis-credit the final channel and starve assisting channels.
    segmentation_pitfalls: campaign/region/landing_page cells are sparse for the rare purchase event;
      enforce minimum-session gating and widen windows.
  root_cause:
    upstream_drivers:
    - purchasing_sessions
    - sessions
    - checkout_to_purchase_rate
    - cart_to_checkout_rate
    - view_to_cart_rate
    downstream_impacts:
    - revenue
    - revenue_per_session
    - revenue_per_user
    related_dimensions:
    - device_category
    - channel_group
    - landing_page
    decomposition_path: Split by channel_group x device_category; run decompose_change (mix vs rate vs
      interaction) to separate a traffic-mix shift from a true within-segment conversion change; drill
      the largest rate-effect cell, then walk the step funnel (view_to_cart -> cart_to_checkout -> checkout_to_purchase)
      to localize the leaking stage.
  agents:
  - Monitor
  - Decompose
  - Diagnose
  - Prescribe
  - Critic
  - Narrator
  validation_checks:
  - 0 <= value <= 1
  - value = SUM(purchasing_sessions)/SUM(sessions) per grouped cell (mix-weighted)
  - reconciles to warehouse-mcp.reconcile within 0.5%
  testing:
    dbt_tests:
    - not_null
    - 'dbt_utils.accepted_range: {min_value: 0, max_value: 1, inclusive: true}'
    quality_checks:
    - session_conversion_rate <= 1 for every cell
    - blended rate equals SUM(num)/SUM(den) on per-cell recompute
    - session_conversion_rate <= user_conversion_rate at grand total (more sessions than users dilutes
      the per-visit rate)
    anomaly_checks:
    - stl-residual on daily series, weekly seasonality aware
    reconciliation_checks:
    - semantic vs fct_daily_funnel additive recompute of SUM(purchasing_sessions)/SUM(sessions) within
      0.5%
  freshness_requirements: daily; available <=36h after event_date
- metric_name: user_conversion_rate
  label: User Conversion Rate
  category: conversion
  type: ratio
  business_definition: Of all distinct users, the share who purchased in at least one session — the per-person
    conversion rate. Computed as SUM(purchasing_users)/SUM(users) after grouping. Answers 'what fraction
    of PEOPLE bought', as opposed to session_conversion_rate which answers 'what fraction of VISITS converted'.
  sql_definition: SAFE_DIVIDE(COUNT(DISTINCT IF(reached_purchase, user_pseudo_id, NULL)), COUNT(DISTINCT
    user_pseudo_id))
  aggregation_method: ratio
  grain: fct_funnel
  entity: user
  numerator: purchasing_users
  denominator: users
  expr: null
  dimensions_supported:
  - device_category
  - operating_system
  - browser
  - country
  - region
  - channel_group
  - source
  - medium
  - campaign
  - landing_page
  - is_new_user
  - session_number_bucket
  - day
  - week
  - month
  - quarter
  owner: analytics-eng
  version: 1.0.0
  caveats:
  - 'Always in [0,1]: purchasing_users <= users by construction.'
  - 'PER-PERSON, not per-visit: a user who buys in any of their sessions is one converter. Always >= session_conversion_rate
    at the same grain because users have >= 1 session each.'
  - 'Distinct-count numerator and denominator are NON-ADDITIVE across dimension cells: a user appearing
    under two channels/devices is counted in each cell, so cells do not sum to the total. Recompute distinct
    at every grouping level — do not sum cell counts.'
  - Slicing by a SESSION dimension (channel_group, device_category, landing_page) assigns a user to every
    value they touched; cross-cell user overlap is expected and the totals will not add up.
  - SAFE_DIVIDE returns NULL on zero users; NULL = no data.
  common_mistakes:
  - Summing per-cell purchasing_users or users across dimensions (distinct counts are not additive).
  - Comparing user_conversion_rate to session_conversion_rate as if they were the same metric.
  - Averaging per-segment user rates instead of recomputing distinct counts at the grouped level.
  guardrails:
    do_not_use_when:
    - You need per-visit efficiency (use session_conversion_rate).
    - You are slicing by a session-scoped dimension and need additive, non-overlapping cells (user identity
      spans sessions/channels).
    - Users in a cell are below the minimum-volume gate.
    misinterpretations:
    - Reading it as session conversion (it de-duplicates people, so it is mechanically higher).
    - Expecting dimension cells to sum to the total — distinct users overlap across cells.
    simpsons_paradox_risk: HIGH. Per-person conversion varies by acquisition channel_group and device_category,
      and a mix shift re-weights the blend independently of any within-segment change; compounded by cross-cell
      user overlap from distinct counting. ALWAYS decompose by channel_group x device_category and recompute
      distinct counts per cell — never sum cells.
    attribution_pitfalls: A user touches multiple channels across sessions; assigning the user to a single
      channel for this rate is inherently lossy. Session-level last-touch under-credits assisting channels
      and double-assigns multi-channel users across cells.
    segmentation_pitfalls: Because users span sessions, dimension slices double-count users across cells;
      never present per-cell user counts as a partition of the total.
  root_cause:
    upstream_drivers:
    - purchasing_users
    - users
    downstream_impacts:
    - revenue_per_user
    - revenue
    related_dimensions:
    - channel_group
    - device_category
    - is_new_user
    decomposition_path: Split by channel_group x device_category, recomputing distinct purchasing_users
      and users WITHIN each cell (never summing cells); run decompose_change (mix vs rate vs interaction);
      drill the largest rate-effect cell and contrast against session_conversion_rate to see whether the
      move is per-person reach or per-visit efficiency.
  agents:
  - Monitor
  - Decompose
  - Diagnose
  - Prescribe
  - Critic
  - Narrator
  validation_checks:
  - 0 <= value <= 1
  - value = SUM(purchasing_users)/SUM(users) recomputed distinct per grouped cell
  - value >= session_conversion_rate at the same grain (per-person >= per-visit)
  - reconciles to warehouse-mcp.reconcile within 0.5%
  testing:
    dbt_tests:
    - not_null
    - 'dbt_utils.accepted_range: {min_value: 0, max_value: 1, inclusive: true}'
    quality_checks:
    - user_conversion_rate <= 1 for every cell
    - user_conversion_rate >= session_conversion_rate at grand total
    - distinct-count numerator/denominator recomputed per cell (not summed)
    anomaly_checks:
    - stl-residual on daily series, weekly seasonality aware
    reconciliation_checks:
    - 'semantic vs warehouse recompute of distinct purchasing_users/users within 0.5% (NOTE: not validated
      against additive fct_daily_funnel because distinct user counts are non-additive)'
  freshness_requirements: daily; available <=36h after event_date
- metric_name: purchasing_users
  label: Purchasing Users
  category: supporting
  type: count
  business_definition: 'Number of DISTINCT users who reached the purchase step in at least one session
    within the period. Backs user_conversion_rate (numerator). Counts PEOPLE, not sessions or transactions:
    a user who purchases across several sessions counts once.'
  sql_definition: COUNT(DISTINCT IF(reached_purchase, user_pseudo_id, NULL))
  aggregation_method: count_distinct
  grain: fct_funnel
  entity: user
  numerator: null
  denominator: null
  expr: null
  dimensions_supported:
  - device_category
  - operating_system
  - browser
  - country
  - region
  - channel_group
  - source
  - medium
  - campaign
  - landing_page
  - is_new_user
  - session_number_bucket
  - day
  - week
  - month
  - quarter
  owner: analytics-eng
  version: 1.0.0
  caveats:
  - 'Distinct-user count: NON-ADDITIVE across dimension cells and across time buckets. A user buying under
    two channels/devices counts in each cell, so cells do not sum to the total; a user purchasing on two
    days counts in each day but once in the period total. Recompute distinct at the desired grain — never
    sum.'
  - 'Differs from purchasing_sessions (sessions with a purchase) and from orders (transactions): one purchasing
    user can produce many purchasing sessions and many orders.'
  - Slicing by a session dimension assigns the user to every value they touched (cross-cell overlap).
  common_mistakes:
  - Summing daily purchasing_users to get a monthly figure (over-counts repeat buyers).
  - Equating purchasing_users with orders or purchasing_sessions.
  - Summing per-channel purchasing_users to a total (distinct counts overlap across cells).
  guardrails:
    do_not_use_when:
    - You need additive period roll-ups (distinct counts are non-additive — recompute at the target grain).
    - You need transaction volume (use orders) or purchasing-visit volume (use purchasing_sessions).
    misinterpretations:
    - Reading it as purchase count — it is distinct buyers.
    simpsons_paradox_risk: As a count it is not itself a rate, but as the numerator of user_conversion_rate
      it inherits mix sensitivity; recompute distinct per cell and decompose by channel_group x device_category.
    attribution_pitfalls: A multi-channel user is assigned to every channel they touched when sliced,
      double-counting that user across channel cells.
    segmentation_pitfalls: Never present per-cell purchasing_users as a partition of the total; cells
      overlap because user identity spans sessions and channels.
  root_cause:
    upstream_drivers:
    - users
    - purchasing_sessions
    downstream_impacts:
    - user_conversion_rate
    - revenue_per_user
    related_dimensions:
    - channel_group
    - device_category
    - is_new_user
    decomposition_path: Split by channel_group x device_category, recomputing distinct purchasing_users
      within each cell (never summing); feed user_conversion_rate's mix-vs-rate decomposition.
  agents:
  - Decompose
  - Diagnose
  - Critic
  validation_checks:
  - value >= 0 (non-negative distinct count)
  - value <= users for every cell (cannot exceed distinct users)
  - value <= purchasing_sessions at the same grain (a purchasing user has >= 1 purchasing session)
  - reconciles to warehouse-mcp.reconcile within 0.5%
  testing:
    dbt_tests:
    - not_null
    - 'dbt_utils.accepted_range: {min_value: 0, inclusive: true}'
    quality_checks:
    - purchasing_users <= users per grouped cell
    - 'period-total purchasing_users recomputed distinct (not summed from daily) '
    anomaly_checks:
    - stl-residual on daily series, weekly seasonality aware
    reconciliation_checks:
    - 'semantic vs warehouse recompute of COUNT(DISTINCT purchasing user_pseudo_id) within 0.5% (NOTE:
      non-additive — not reconciled against summed fct_daily_funnel cells)'
  freshness_requirements: daily; available <=36h after event_date
- metric_name: day_1_retention
  label: Day-1 Retention Rate
  category: retention
  type: ratio
  business_definition: Of the users acquired in a weekly cohort, the share who returned (had any session)
    on day 1 of their lifecycle. Measures whether first-day onboarding / re-engagement holds the brand-new
    user. Denominator is the FIXED original cohort size, never the surviving population, so retention
    is monotonically non-increasing across ages.
  sql_definition: SAFE_DIVIDE(SUM(retained_users_d1), SUM(cohort_size))
  aggregation_method: ratio
  grain: fct_cohorts
  entity: cohort
  numerator: retained_users_d1
  denominator: cohort_size
  expr: null
  dimensions_supported:
  - device_category
  - country
  - channel_group
  - source
  - medium
  - campaign
  - is_new_user
  - week
  - month
  - quarter
  owner: analytics-eng
  version: 1.0.0
  caveats:
  - Denominator is the fixed acquisition-cohort size (week of user_first_touch_timestamp), NOT the surviving
    population; retention is monotonically non-increasing by construction (d1 >= d7 >= d30).
  - Cohort = users grouped by ISO week (Monday) of first touch; an age=1 'day' is relative to first-touch,
    not a calendar day.
  - 'user_pseudo_id is a device/cookie key: cookie churn, multi-device use, and ITP/cookie expiry inflate
    apparent loss (a returning human on a new cookie looks like a churned user AND a new acquisition).'
  - '~3-month dataset window: cohorts acquired in the final week have a full d1 horizon, so d1 is the
    LEAST censored retention metric - but late cohorts are still small and noisy.'
  common_mistakes:
  - Averaging per-cohort retention rates instead of SUM(retained)/SUM(cohort_size) - reintroduces Simpson's
    paradox across cohort sizes.
  - 'Treating non-return as churn: GA4 cannot see a user who returns on a new cookie; do not narrate cookie-based
    loss as true churn.'
  - Comparing d1 across channels without noting that paid/Display cohorts skew new-cookie and one-touch
    (overstated loss).
  guardrails:
    do_not_use_when:
    - Cohorts with cohort_size below the minimum sample threshold (small-cohort noise dominates the rate).
    - Cross-product or per-item retention questions - retention is a user/cohort metric, not an item metric.
    misinterpretations:
    - '''Day-1 retention'' is return-on-lifecycle-day-1, not ''percent of yesterday''s users active today''
      (that is rolling/active-user retention, a different definition).'
    - 'Not a conversion metric: a retained user need not purchase.'
    simpsons_paradox_risk: 'High across cohort_group and channel_group: large low-retention cohorts can
      drag the blended rate even when each segment improves. Always aggregate SUM(num)/SUM(den) and decompose
      by cohort/channel before concluding.'
    attribution_pitfalls: Cohort acquisition channel is the FIRST-TOUCH session source; later-session
      behavior is attributed to the first-touch channel, which biases channel-level retention comparisons.
    segmentation_pitfalls: Slicing by is_new_user is redundant (a cohort is new users by definition);
      slice by acquisition channel_group / device_category instead. Tiny cohort x dimension cells are
      unreliable.
  root_cause:
    upstream_drivers:
    - retained_users_d1
    - cohort_size
    downstream_impacts:
    - day_7_retention
    - day_30_retention
    - repeat_purchase_rate
    - revenue_per_user
    related_dimensions:
    - channel_group
    - device_category
    - country
    decomposition_path: Split by cohort week x channel_group; run decompose_change to separate cohort-mix
      shift (more low-retention paid cohorts) from in-cohort rate change; drill the largest rate-effect
      cohort/channel.
  agents:
  - Monitor
  - Diagnose
  - Critic
  validation_checks:
  - 0 <= value <= 1
  - day_1_retention >= day_7_retention >= day_30_retention for the same cohort (monotonic)
  - reconciles to warehouse-mcp.reconcile within 0.5%
  testing:
    dbt_tests:
    - not_null
    - 'dbt_utils.accepted_range: 0..1'
    quality_checks:
    - retained_users_d1 <= cohort_size for every cohort row
    - cohort_size > 0 for every included cohort
    anomaly_checks:
    - stl-residual on weekly cohort series; flag cohorts whose d1 deviates from trailing-cohort baseline
    reconciliation_checks:
    - SUM(retained_users_d1)/SUM(cohort_size) over fct_cohorts equals additive recompute within 0.5%
  freshness_requirements: daily; available <=36h after event_date (d1 horizon resolves quickly, so freshness
    is gated by ingestion not by maturation)
- metric_name: day_7_retention
  label: Day-7 Retention Rate
  category: retention
  type: ratio
  business_definition: Of the users acquired in a weekly cohort, the share who returned (had any session)
    by day 7 of their lifecycle. Primary short-horizon stickiness KPI - whether the product earns a second
    visit within the first week. Denominator is the fixed original cohort size.
  sql_definition: SAFE_DIVIDE(SUM(retained_users_d7), SUM(cohort_size))
  aggregation_method: ratio
  grain: fct_cohorts
  entity: cohort
  numerator: retained_users_d7
  denominator: cohort_size
  expr: null
  dimensions_supported:
  - device_category
  - country
  - channel_group
  - source
  - medium
  - campaign
  - is_new_user
  - week
  - month
  - quarter
  owner: analytics-eng
  version: 1.0.0
  caveats:
  - Denominator is the FIXED cohort size; d7 <= d1 always (monotonic non-increasing).
  - 'RIGHT-CENSORING: cohorts acquired within the final 7 days of the ~3-month window have NOT had a full
    7-day horizon. They must be EXCLUDED from d7 (incomplete maturation), not counted as low-retention.
    Reporting an immature cohort understates d7.'
  - 'Cookie-based identity: cookie churn / multi-device / cross-browser visits suppress measured return;
    treat as a floor on true human retention.'
  - Cohort acquisition channel is first-touch; paid cohorts (one-touch, new-cookie heavy) systematically
    show lower d7.
  common_mistakes:
  - Including immature (right-censored) final-week cohorts in the d7 denominator - the single largest
    source of artificially depressed retention.
  - Averaging per-cohort rates instead of SUM/SUM.
  - Reading a d7 drop as a product regression when it is a cohort-mix shift toward low-retention channels
    (run decompose_change first).
  guardrails:
    do_not_use_when:
    - Any cohort younger than 7 days relative to the window's right edge (right-censored; exclude).
    - Cohorts below the minimum cohort_size threshold.
    misinterpretations:
    - '''Day-7'' is cumulative return BY day 7, not return exactly ON day 7.'
    - Not a purchase metric; a retained user need not transact.
    simpsons_paradox_risk: High across cohort week and channel_group; blended d7 can fall purely from
      acquiring more low-retention cohorts. Always decompose mix vs rate.
    attribution_pitfalls: 'First-touch cohort attribution: a user acquired via Paid Search but who truly
      engages via Email later is still scored against Paid Search, biasing channel retention.'
    segmentation_pitfalls: Late, small, partially-censored cohorts x narrow dimension cells are doubly
      unreliable; enforce maturity AND minimum-size filters before slicing.
  root_cause:
    upstream_drivers:
    - retained_users_d7
    - cohort_size
    downstream_impacts:
    - day_30_retention
    - repeat_purchase_rate
    - revenue_per_user
    related_dimensions:
    - channel_group
    - device_category
    - country
    decomposition_path: Filter to MATURE cohorts (>=7 days old); split by cohort week x channel_group;
      decompose_change to isolate cohort-mix vs in-cohort rate; drill the dominant rate-effect.
  agents:
  - Monitor
  - Diagnose
  - Critic
  validation_checks:
  - 0 <= value <= 1
  - day_7_retention <= day_1_retention and day_7_retention >= day_30_retention (monotonic)
  - only mature cohorts (>=7 days old at window edge) included
  - reconciles to warehouse-mcp.reconcile within 0.5%
  testing:
    dbt_tests:
    - not_null
    - 'dbt_utils.accepted_range: 0..1'
    quality_checks:
    - retained_users_d7 <= retained_users_d1 <= cohort_size per cohort
    - immature cohorts flagged/excluded (cohort age >= 7 days before right edge)
    anomaly_checks:
    - stl-residual on weekly cohort series, mature cohorts only, weekly seasonality aware
    reconciliation_checks:
    - SUM(retained_users_d7)/SUM(cohort_size) over mature fct_cohorts equals additive recompute within
      0.5%
  freshness_requirements: daily; available <=36h after event_date; a cohort's d7 value is FINAL only once
    the cohort is >=7 days past first touch
- metric_name: day_30_retention
  label: Day-30 Retention Rate
  category: retention
  type: ratio
  business_definition: 'Of the users acquired in a weekly cohort, the share who returned (had any session)
    by day 30 of their lifecycle. Long-horizon loyalty signal. HEAVILY constrained by the ~3-month dataset:
    only the EARLIEST cohorts have a full 30-day observation window; later cohorts are right-censored
    and excluded.'
  sql_definition: SAFE_DIVIDE(SUM(retained_users_d30), SUM(cohort_size))
  aggregation_method: ratio
  grain: fct_cohorts
  entity: cohort
  numerator: retained_users_d30
  denominator: cohort_size
  expr: null
  dimensions_supported:
  - device_category
  - country
  - channel_group
  - source
  - medium
  - campaign
  - is_new_user
  - week
  - month
  - quarter
  owner: analytics-eng
  version: 1.0.0
  caveats:
  - 'SEVERE RIGHT-CENSORING / SURVIVORSHIP: the dataset spans only ~3 months (2020-11-01 to 2021-01-31).
    day_30_retention is OBSERVABLE ONLY for cohorts acquired >=30 days before the window''s right edge
    - effectively just the November/early-December cohorts. Roughly the final ~4 weeks of cohorts CANNOT
    be measured at d30 and MUST be excluded, not treated as churned.'
  - Because only the earliest cohorts qualify, d30 is computed on a SMALL, NON-REPRESENTATIVE slice (holiday-season
    acquisition) - generalize with extreme caution; it is not a steady-state loyalty rate.
  - Denominator is the fixed cohort size; d30 <= d7 <= d1 (monotonic).
  - Cookie-based identity understates true 30-day human return (30 days is ample time for cookie churn
    / device switching).
  - TRUE long-horizon retention requires a longer event history than this sample provides; deferred to
    a production dataset (Bible roadmap).
  common_mistakes:
  - Reporting d30 across ALL cohorts including censored late ones - mechanically drives the number toward
    zero and is the headline trap of this metric.
  - Generalizing the early-cohort holiday d30 to year-round behavior.
  - Averaging per-cohort rates instead of SUM/SUM over the (few) mature cohorts.
  guardrails:
    do_not_use_when:
    - ANY cohort younger than 30 days relative to the window right edge (right-censored; exclude unconditionally).
    - A stable, generalizable loyalty estimate is required - the observable window is too short and holiday-biased.
    - Cohorts below the minimum size threshold (mature cohort set is already tiny).
    misinterpretations:
    - A low blended d30 here is almost always a CENSORING artifact, not real 30-day churn.
    - Not 'monthly active retention'; it is cumulative return BY lifecycle-day 30 for a fixed cohort.
    simpsons_paradox_risk: 'Present but secondary to censoring: with so few mature cohorts, censoring
      bias dominates mix bias. Resolve maturity first, then decompose mix vs rate.'
    attribution_pitfalls: 'First-touch cohort attribution plus a holiday-skewed mature-cohort set: channel-level
      d30 comparisons reflect November acquisition mix, not steady state.'
    segmentation_pitfalls: Slicing the already-tiny mature-cohort set by channel x device produces near-empty,
      unreliable cells; avoid deep segmentation - report at most channel_group on mature cohorts.
  root_cause:
    upstream_drivers:
    - retained_users_d30
    - cohort_size
    downstream_impacts:
    - repeat_purchase_rate
    - revenue_per_user
    related_dimensions:
    - channel_group
    - device_category
    - country
    decomposition_path: Filter to MATURE cohorts (>=30 days old) ONLY; if too few remain, report directionally
      with a censoring caveat rather than decomposing; otherwise split by channel_group and decompose_change.
  agents:
  - Diagnose
  - Critic
  validation_checks:
  - 0 <= value <= 1
  - day_30_retention <= day_7_retention <= day_1_retention (monotonic)
  - only cohorts with >=30 days of observation included; censored cohorts excluded
  - reconciles to warehouse-mcp.reconcile within 0.5%
  testing:
    dbt_tests:
    - not_null
    - 'dbt_utils.accepted_range: 0..1'
    quality_checks:
    - retained_users_d30 <= retained_users_d7 <= retained_users_d1 <= cohort_size per cohort
    - EVERY included cohort has >=30 days between first touch and window right edge (maturity assertion)
    - censored-cohort count is reported alongside the metric for transparency
    anomaly_checks:
    - stl-residual NOT applied for trend-detection here (too few mature points); use level-check against
      the mature-cohort baseline only
    reconciliation_checks:
    - SUM(retained_users_d30)/SUM(cohort_size) over MATURE fct_cohorts equals additive recompute within
      0.5%
  freshness_requirements: daily ingest; a cohort's d30 value is FINAL only >=30 days past first touch
    - within this ~3-month sample most cohorts never mature
- metric_name: repeat_purchase_rate
  label: Repeat Purchase Rate
  category: retention
  type: ratio
  business_definition: 'Of all purchasers in the window, the share who placed two or more orders. A monetized
    loyalty signal: does a buyer come back to buy again? Distinct from session/return retention - it counts
    repeat TRANSACTIONS, not repeat visits.'
  sql_definition: SAFE_DIVIDE(COUNT(DISTINCT IF(user_order_count >= 2, buyer_user_id, NULL)), COUNT(DISTINCT
    IF(user_order_count >= 1, buyer_user_id, NULL)))
  aggregation_method: ratio
  grain: fct_orders
  entity: user
  numerator: repeat_purchasers
  denominator: purchasers
  expr: null
  dimensions_supported:
  - device_category
  - country
  - channel_group
  - source
  - medium
  - campaign
  - is_new_user
  - day
  - week
  - month
  - quarter
  owner: analytics-eng
  version: 1.0.0
  caveats:
  - 'WINDOW-BOUNDED: a buyer''s 2nd order may fall OUTSIDE the ~3-month window, so repeat_purchase_rate
    is right-censored and is a LOWER BOUND on true lifetime repeat behavior.'
  - 'Cookie-based buyer identity (user_pseudo_id): a returning buyer on a new device/cookie reads as a
    NEW one-time purchaser, deflating the rate.'
  - '''Repeat'' here means >=2 distinct orders (transaction_id) by the same user within the window, not
    >=2 of the same item.'
  - 'Holiday-season window: gifting / one-off seasonal buyers depress the repeat rate relative to steady
    state.'
  common_mistakes:
  - Confusing repeat_purchase_rate (users with >=2 orders / users with >=1 order) with retention (return
    visits) or with product_attach_rate (orders containing an item).
  - Counting orders instead of distinct buyers in the denominator.
  - Reading a low rate as disloyalty when it is mostly window right-censoring of the second order.
  guardrails:
    do_not_use_when:
    - The analysis needs lifetime repeat behavior - the window is too short; this is a within-window lower
      bound.
    - Periods with very few purchasers (denominator instability).
    misinterpretations:
    - Not repeat-VISIT retention; a user can return many times yet buy only once (rate excludes them from
      numerator).
    - Not the inverse of churn.
    simpsons_paradox_risk: 'Across channel_group and device_category: high-volume one-time-buyer channels
      (e.g. Display) can drag the blended rate. Aggregate SUM/SUM and decompose.'
    attribution_pitfalls: If sliced by channel_group, the channel is the order's session channel (first-touch
      gotcha); a user's two orders may be attributed to different channels, splitting one repeat buyer
      across segments.
    segmentation_pitfalls: Per-segment purchaser counts are small in a 3-month e-commerce sample; narrow
      slices give unstable rates. Enforce a minimum purchaser count per cell.
  root_cause:
    upstream_drivers:
    - repeat_purchasers
    - purchasers
    downstream_impacts:
    - revenue
    - revenue_per_user
    - aov
    related_dimensions:
    - channel_group
    - device_category
    - country
    decomposition_path: Split by acquisition channel_group x device_category; decompose_change to separate
      purchaser-mix shift from in-segment repeat-rate change; drill the largest rate-effect segment.
  agents:
  - Monitor
  - Decompose
  - Diagnose
  - Prescribe
  - Critic
  - Narrator
  validation_checks:
  - 0 <= value <= 1
  - repeat_purchasers <= purchasers
  - reconciles to warehouse-mcp.reconcile within 0.5%
  testing:
    dbt_tests:
    - not_null
    - 'dbt_utils.accepted_range: 0..1'
    quality_checks:
    - repeat_purchasers <= purchasers always
    - a user counted in repeat_purchasers has >=2 distinct transaction_id in-window
    anomaly_checks:
    - stl-residual on weekly buyer series, weekly seasonality aware
    reconciliation_checks:
    - distinct-buyer recompute from fct_orders matches semantic value within 0.5%
  freshness_requirements: daily; available <=36h after event_date; value for recent buyers keeps maturing
    as later orders land
- metric_name: cohort_size
  label: Cohort Size
  category: supporting
  type: count
  business_definition: 'Supporting measure: the FIXED number of distinct users acquired in a weekly cohort
    (grouped by ISO week of user_first_touch_timestamp). The denominator for every day_N_retention rate;
    constant across cohort age.'
  sql_definition: SUM(cohort_size)
  aggregation_method: sum
  grain: fct_cohorts
  entity: cohort
  numerator: null
  denominator: null
  expr: null
  dimensions_supported:
  - device_category
  - country
  - channel_group
  - source
  - medium
  - campaign
  - week
  - month
  - quarter
  owner: analytics-eng
  version: 1.0.0
  caveats:
  - Pre-aggregated count of distinct first-touch users per cohort, stored once per cohort row; SUM over
    the cohort-x-age grain double-counts if age is not collapsed - aggregate at one age (e.g. age=0) or
    use a deduplicated cohort dimension.
  - Counts distinct user_pseudo_id (cookie); cookie churn means cohort size is a device-cookie count,
    not a distinct-human count.
  - Cohort assignment is first-touch; a user belongs to exactly one cohort for life.
  common_mistakes:
  - Summing cohort_size across cohort ages (it repeats per age row) and overstating acquisition.
  - Using it as a window-wide user count - it is per-cohort, not the same as the users metric.
  guardrails:
    do_not_use_when:
    - A general 'users in window' count is needed - use the users metric (cluster 02) instead.
    misinterpretations:
    - It is the FIXED acquisition base, not the surviving population at any age.
    simpsons_paradox_risk: Not a rate; no Simpson's risk itself, but it is the weight that drives Simpson's
      effects in retention rates.
    attribution_pitfalls: Cohort channel is first-touch session source.
    segmentation_pitfalls: Slicing into tiny cohort cells makes the retention rates that divide by it
      unstable.
  root_cause:
    upstream_drivers:
    - new_users
    downstream_impacts:
    - day_1_retention
    - day_7_retention
    - day_30_retention
    related_dimensions:
    - channel_group
    - device_category
    - country
    decomposition_path: Acts as the mix weight for retention; split by channel_group to see acquisition
      composition feeding cohort-mix shifts.
  agents:
  - Decompose
  - Diagnose
  - Critic
  validation_checks:
  - cohort_size > 0 for every cohort
  - cohort_size is constant across ages within a cohort
  testing:
    dbt_tests:
    - not_null
    - 'dbt_utils.accepted_range: 1..'
    quality_checks:
    - cohort_size identical for all age rows of the same cohort_week
    anomaly_checks:
    - stl-residual on weekly acquisition (cohort_size) series, weekly seasonality aware
    reconciliation_checks:
    - SUM of distinct cohort_size across cohorts reconciles to distinct new_users within 0.5%
  freshness_requirements: daily; available <=36h after event_date (fixed once the acquisition week closes)
