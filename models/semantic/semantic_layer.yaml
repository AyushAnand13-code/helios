  - is_new_user
  - session_number_bucket
  - day
  - week
  - month
  - quarter
  owner: analytics-eng
  version: 1.0.0
  caveats:
  - 'COOKIE-grain: ''returning'' means the user_pseudo_id cookie had a prior session, not that the human
    is loyal. Cookie churn UNDER-counts returning users - a returning human whose cookie was cleared shows
    up as new instead.'
  - Defined directly as distinct non-first-session cookies, NOT as (users - new_users). At rolled-up grains
    those differ because a single cookie can have both a first and a later session inside the window.
  - 'Bounded by the GA4 export horizon (Nov 2020-Jan 2021): a session can only be ''returning'' if GA4
    recorded a prior session for the cookie, which is itself subject to cookie persistence.'
  common_mistakes:
  - Computing returning_users = users - new_users at any grouped grain - this double-subtracts cookies
    that are both new and returning within the window.
  - Interpreting returning_users as repeat purchasers - returning means repeat VISITS, not repeat ORDERS
    (see repeat_purchase_rate in the retention cluster).
