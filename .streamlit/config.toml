# Helios dashboard theme — modern dark (committed; applies locally and on Streamlit Cloud).
[theme]
base = "dark"
primaryColor = "#7C5CFF"              # electric violet accent (buttons, charts, highlights)
backgroundColor = "#0B0F1A"           # deep navy-black page
secondaryBackgroundColor = "#141A2A"  # sidebar + widget surfaces (slate panel)
textColor = "#E8ECF5"                 # soft white, easy on the eyes
font = "sans serif"
