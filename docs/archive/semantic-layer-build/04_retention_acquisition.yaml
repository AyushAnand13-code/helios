# =============================================================================
# Helios Semantic Layer - Cluster 04: RETENTION + ACQUISITION
# =============================================================================
# Canonical path (build fragment): models/semantic/_build/04_retention_acquisition.yaml
# Merged into the production registry (models/semantic/semantic_models.yml) at compile.
#
# NAMED metrics:
#   RETENTION:   day_1_retention, day_7_retention, day_30_retention, repeat_purchase_rate
#   ACQUISITION: channel_revenue, channel_conversion_rate, cac_proxy, traffic_share
# SUPPORTING measures (defined in THIS cluster, marked category: supporting):
#   RETENTION:   cohort_size, retained_users_d1, retained_users_d7, retained_users_d30 (grain fct_cohorts)
#                purchasers, repeat_purchasers (grain fct_orders)
#   ACQUISITION: paid_sessions, new_purchasers (grain fct_funnel)
#
# HONESTY NOTES (load-bearing, do not soften):
#   * Dataset window is ~3 months (2020-11-01 -> 2021-01-31). day_30_retention is only
#     OBSERVABLE for cohorts acquired >=30 days before the window's right edge; later cohorts
#     are right-censored and MUST be excluded from the denominator, not counted as churned.
#   * cac_proxy is NOT true CAC. The GA4 export carries NO marketing cost/spend. cac_proxy is a
#     paid-sessions-per-new-customer VOLUME EFFICIENCY proxy. True CAC = spend / new_customers
#     requires an external cost table (deferred; Bible roadmap).
#   * traffic_share IS the mix weight w_i in the decompose_change identity
#     dR = SUM(dw_i * r_i) + SUM(w_i * dr_i) + SUM(dw_i * dr_i). It feeds the mix-vs-rate story.
#   * channel_* metrics inherit the traffic_source first-touch attribution gotcha: GA4 event-level
#     traffic_source.* is USER FIRST-TOUCH, not the session's true source. channel_group is built
#     from session-scoped event_params.source/medium (first-touch fallback only when null).
# =============================================================================

metrics:

  # ===========================================================================
  # RETENTION (cluster 04) - grain fct_cohorts (weekly acquisition cohort x age)
  # ===========================================================================

  - metric_name: day_1_retention
    label: "Day-1 Retention Rate"
    category: retention
    type: ratio
    business_definition: "Of the users acquired in a weekly cohort, the share who returned (had any session) on day 1 of their lifecycle. Measures whether first-day onboarding / re-engagement holds the brand-new user. Denominator is the FIXED original cohort size, never the surviving population, so retention is monotonically non-increasing across ages."
    sql_definition: "SAFE_DIVIDE(SUM(retained_users_d1), SUM(cohort_size))"
    aggregation_method: ratio
    grain: fct_cohorts
    entity: cohort
    numerator: retained_users_d1
    denominator: cohort_size
    expr: null
    dimensions_supported: [device_category, country, channel_group, source, medium, campaign, is_new_user, week, month, quarter]
    owner: analytics-eng
    version: 1.0.0
    caveats:
      - "Denominator is the fixed acquisition-cohort size (week of user_first_touch_timestamp), NOT the surviving population; retention is monotonically non-increasing by construction (d1 >= d7 >= d30)."
      - "Cohort = users grouped by ISO week (Monday) of first touch; an age=1 'day' is relative to first-touch, not a calendar day."
      - "user_pseudo_id is a device/cookie key: cookie churn, multi-device use, and ITP/cookie expiry inflate apparent loss (a returning human on a new cookie looks like a churned user AND a new acquisition)."
      - "~3-month dataset window: cohorts acquired in the final week have a full d1 horizon, so d1 is the LEAST censored retention metric - but late cohorts are still small and noisy."
    common_mistakes:
      - "Averaging per-cohort retention rates instead of SUM(retained)/SUM(cohort_size) - reintroduces Simpson's paradox across cohort sizes."
      - "Treating non-return as churn: GA4 cannot see a user who returns on a new cookie; do not narrate cookie-based loss as true churn."
      - "Comparing d1 across channels without noting that paid/Display cohorts skew new-cookie and one-touch (overstated loss)."
    guardrails:
      do_not_use_when:
        - "Cohorts with cohort_size below the minimum sample threshold (small-cohort noise dominates the rate)."
        - "Cross-product or per-item retention questions - retention is a user/cohort metric, not an item metric."
      misinterpretations:
        - "'Day-1 retention' is return-on-lifecycle-day-1, not 'percent of yesterday's users active today' (that is rolling/active-user retention, a different definition)."
        - "Not a conversion metric: a retained user need not purchase."
      simpsons_paradox_risk: "High across cohort_group and channel_group: large low-retention cohorts can drag the blended rate even when each segment improves. Always aggregate SUM(num)/SUM(den) and decompose by cohort/channel before concluding."
      attribution_pitfalls: "Cohort acquisition channel is the FIRST-TOUCH session source; later-session behavior is attributed to the first-touch channel, which biases channel-level retention comparisons."
      segmentation_pitfalls: "Slicing by is_new_user is redundant (a cohort is new users by definition); slice by acquisition channel_group / device_category instead. Tiny cohort x dimension cells are unreliable."
    root_cause:
      upstream_drivers: [retained_users_d1, cohort_size]
      downstream_impacts: [day_7_retention, day_30_retention, repeat_purchase_rate, revenue_per_user]
      related_dimensions: [channel_group, device_category, country]
      decomposition_path: "Split by cohort week x channel_group; run decompose_change to separate cohort-mix shift (more low-retention paid cohorts) from in-cohort rate change; drill the largest rate-effect cohort/channel."
    agents: [Monitor, Diagnose, Critic]
    validation_checks:
      - "0 <= value <= 1"
      - "day_1_retention >= day_7_retention >= day_30_retention for the same cohort (monotonic)"
      - "reconciles to warehouse-mcp.reconcile within 0.5%"
    testing:
      dbt_tests: ["not_null", "dbt_utils.accepted_range: 0..1"]
      quality_checks:
        - "retained_users_d1 <= cohort_size for every cohort row"
        - "cohort_size > 0 for every included cohort"
      anomaly_checks: ["stl-residual on weekly cohort series; flag cohorts whose d1 deviates from trailing-cohort baseline"]
      reconciliation_checks: ["SUM(retained_users_d1)/SUM(cohort_size) over fct_cohorts equals additive recompute within 0.5%"]
    freshness_requirements: "daily; available <=36h after event_date (d1 horizon resolves quickly, so freshness is gated by ingestion not by maturation)"

  - metric_name: day_7_retention
    label: "Day-7 Retention Rate"
    category: retention
    type: ratio
    business_definition: "Of the users acquired in a weekly cohort, the share who returned (had any session) by day 7 of their lifecycle. Primary short-horizon stickiness KPI - whether the product earns a second visit within the first week. Denominator is the fixed original cohort size."
    sql_definition: "SAFE_DIVIDE(SUM(retained_users_d7), SUM(cohort_size))"
    aggregation_method: ratio
    grain: fct_cohorts
    entity: cohort
    numerator: retained_users_d7
    denominator: cohort_size
    expr: null
    dimensions_supported: [device_category, country, channel_group, source, medium, campaign, is_new_user, week, month, quarter]
    owner: analytics-eng
    version: 1.0.0
    caveats:
      - "Denominator is the FIXED cohort size; d7 <= d1 always (monotonic non-increasing)."
      - "RIGHT-CENSORING: cohorts acquired within the final 7 days of the ~3-month window have NOT had a full 7-day horizon. They must be EXCLUDED from d7 (incomplete maturation), not counted as low-retention. Reporting an immature cohort understates d7."
      - "Cookie-based identity: cookie churn / multi-device / cross-browser visits suppress measured return; treat as a floor on true human retention."
      - "Cohort acquisition channel is first-touch; paid cohorts (one-touch, new-cookie heavy) systematically show lower d7."
    common_mistakes:
      - "Including immature (right-censored) final-week cohorts in the d7 denominator - the single largest source of artificially depressed retention."
      - "Averaging per-cohort rates instead of SUM/SUM."
      - "Reading a d7 drop as a product regression when it is a cohort-mix shift toward low-retention channels (run decompose_change first)."
    guardrails:
      do_not_use_when:
        - "Any cohort younger than 7 days relative to the window's right edge (right-censored; exclude)."
        - "Cohorts below the minimum cohort_size threshold."
      misinterpretations:
        - "'Day-7' is cumulative return BY day 7, not return exactly ON day 7."
        - "Not a purchase metric; a retained user need not transact."
      simpsons_paradox_risk: "High across cohort week and channel_group; blended d7 can fall purely from acquiring more low-retention cohorts. Always decompose mix vs rate."
      attribution_pitfalls: "First-touch cohort attribution: a user acquired via Paid Search but who truly engages via Email later is still scored against Paid Search, biasing channel retention."
      segmentation_pitfalls: "Late, small, partially-censored cohorts x narrow dimension cells are doubly unreliable; enforce maturity AND minimum-size filters before slicing."
    root_cause:
      upstream_drivers: [retained_users_d7, cohort_size]
      downstream_impacts: [day_30_retention, repeat_purchase_rate, revenue_per_user]
      related_dimensions: [channel_group, device_category, country]
      decomposition_path: "Filter to MATURE cohorts (>=7 days old); split by cohort week x channel_group; decompose_change to isolate cohort-mix vs in-cohort rate; drill the dominant rate-effect."
    agents: [Monitor, Diagnose, Critic]
    validation_checks:
      - "0 <= value <= 1"
      - "day_7_retention <= day_1_retention and day_7_retention >= day_30_retention (monotonic)"
      - "only mature cohorts (>=7 days old at window edge) included"
      - "reconciles to warehouse-mcp.reconcile within 0.5%"
    testing:
      dbt_tests: ["not_null", "dbt_utils.accepted_range: 0..1"]
      quality_checks:
        - "retained_users_d7 <= retained_users_d1 <= cohort_size per cohort"
        - "immature cohorts flagged/excluded (cohort age >= 7 days before right edge)"
      anomaly_checks: ["stl-residual on weekly cohort series, mature cohorts only, weekly seasonality aware"]
      reconciliation_checks: ["SUM(retained_users_d7)/SUM(cohort_size) over mature fct_cohorts equals additive recompute within 0.5%"]
    freshness_requirements: "daily; available <=36h after event_date; a cohort's d7 value is FINAL only once the cohort is >=7 days past first touch"

  - metric_name: day_30_retention
    label: "Day-30 Retention Rate"
    category: retention
    type: ratio
    business_definition: "Of the users acquired in a weekly cohort, the share who returned (had any session) by day 30 of their lifecycle. Long-horizon loyalty signal. HEAVILY constrained by the ~3-month dataset: only the EARLIEST cohorts have a full 30-day observation window; later cohorts are right-censored and excluded."
    sql_definition: "SAFE_DIVIDE(SUM(retained_users_d30), SUM(cohort_size))"
    aggregation_method: ratio
    grain: fct_cohorts
    entity: cohort
    numerator: retained_users_d30
    denominator: cohort_size
    expr: null
    dimensions_supported: [device_category, country, channel_group, source, medium, campaign, is_new_user, week, month, quarter]
    owner: analytics-eng
    version: 1.0.0
    caveats:
      - "SEVERE RIGHT-CENSORING / SURVIVORSHIP: the dataset spans only ~3 months (2020-11-01 to 2021-01-31). day_30_retention is OBSERVABLE ONLY for cohorts acquired >=30 days before the window's right edge - effectively just the November/early-December cohorts. Roughly the final ~4 weeks of cohorts CANNOT be measured at d30 and MUST be excluded, not treated as churned."
      - "Because only the earliest cohorts qualify, d30 is computed on a SMALL, NON-REPRESENTATIVE slice (holiday-season acquisition) - generalize with extreme caution; it is not a steady-state loyalty rate."
      - "Denominator is the fixed cohort size; d30 <= d7 <= d1 (monotonic)."
      - "Cookie-based identity understates true 30-day human return (30 days is ample time for cookie churn / device switching)."
      - "TRUE long-horizon retention requires a longer event history than this sample provides; deferred to a production dataset (Bible roadmap)."
    common_mistakes:
      - "Reporting d30 across ALL cohorts including censored late ones - mechanically drives the number toward zero and is the headline trap of this metric."
      - "Generalizing the early-cohort holiday d30 to year-round behavior."
      - "Averaging per-cohort rates instead of SUM/SUM over the (few) mature cohorts."
    guardrails:
      do_not_use_when:
        - "ANY cohort younger than 30 days relative to the window right edge (right-censored; exclude unconditionally)."
        - "A stable, generalizable loyalty estimate is required - the observable window is too short and holiday-biased."
        - "Cohorts below the minimum size threshold (mature cohort set is already tiny)."
      misinterpretations:
        - "A low blended d30 here is almost always a CENSORING artifact, not real 30-day churn."
        - "Not 'monthly active retention'; it is cumulative return BY lifecycle-day 30 for a fixed cohort."
      simpsons_paradox_risk: "Present but secondary to censoring: with so few mature cohorts, censoring bias dominates mix bias. Resolve maturity first, then decompose mix vs rate."
      attribution_pitfalls: "First-touch cohort attribution plus a holiday-skewed mature-cohort set: channel-level d30 comparisons reflect November acquisition mix, not steady state."
      segmentation_pitfalls: "Slicing the already-tiny mature-cohort set by channel x device produces near-empty, unreliable cells; avoid deep segmentation - report at most channel_group on mature cohorts."
    root_cause:
      upstream_drivers: [retained_users_d30, cohort_size]
      downstream_impacts: [repeat_purchase_rate, revenue_per_user]
      related_dimensions: [channel_group, device_category, country]
      decomposition_path: "Filter to MATURE cohorts (>=30 days old) ONLY; if too few remain, report directionally with a censoring caveat rather than decomposing; otherwise split by channel_group and decompose_change."
    agents: [Diagnose, Critic]
    validation_checks:
      - "0 <= value <= 1"
      - "day_30_retention <= day_7_retention <= day_1_retention (monotonic)"
      - "only cohorts with >=30 days of observation included; censored cohorts excluded"
      - "reconciles to warehouse-mcp.reconcile within 0.5%"
    testing:
      dbt_tests: ["not_null", "dbt_utils.accepted_range: 0..1"]
      quality_checks:
        - "retained_users_d30 <= retained_users_d7 <= retained_users_d1 <= cohort_size per cohort"
        - "EVERY included cohort has >=30 days between first touch and window right edge (maturity assertion)"
        - "censored-cohort count is reported alongside the metric for transparency"
      anomaly_checks: ["stl-residual NOT applied for trend-detection here (too few mature points); use level-check against the mature-cohort baseline only"]
      reconciliation_checks: ["SUM(retained_users_d30)/SUM(cohort_size) over MATURE fct_cohorts equals additive recompute within 0.5%"]
    freshness_requirements: "daily ingest; a cohort's d30 value is FINAL only >=30 days past first touch - within this ~3-month sample most cohorts never mature"

  - metric_name: repeat_purchase_rate
    label: "Repeat Purchase Rate"
    category: retention
    type: ratio
    business_definition: "Of all purchasers in the window, the share who placed two or more orders. A monetized loyalty signal: does a buyer come back to buy again? Distinct from session/return retention - it counts repeat TRANSACTIONS, not repeat visits."
    sql_definition: "SAFE_DIVIDE(COUNT(DISTINCT IF(user_order_count >= 2, buyer_user_id, NULL)), COUNT(DISTINCT IF(user_order_count >= 1, buyer_user_id, NULL)))"
    aggregation_method: ratio
    grain: fct_orders
    entity: user
    numerator: repeat_purchasers
    denominator: purchasers
    expr: null
    dimensions_supported: [device_category, country, channel_group, source, medium, campaign, is_new_user, day, week, month, quarter]
    owner: analytics-eng
    version: 1.0.0
    caveats:
      - "WINDOW-BOUNDED: a buyer's 2nd order may fall OUTSIDE the ~3-month window, so repeat_purchase_rate is right-censored and is a LOWER BOUND on true lifetime repeat behavior."
      - "Cookie-based buyer identity (user_pseudo_id): a returning buyer on a new device/cookie reads as a NEW one-time purchaser, deflating the rate."
      - "'Repeat' here means >=2 distinct orders (transaction_id) by the same user within the window, not >=2 of the same item."
      - "Holiday-season window: gifting / one-off seasonal buyers depress the repeat rate relative to steady state."
    common_mistakes:
      - "Confusing repeat_purchase_rate (users with >=2 orders / users with >=1 order) with retention (return visits) or with product_attach_rate (orders containing an item)."
      - "Counting orders instead of distinct buyers in the denominator."
      - "Reading a low rate as disloyalty when it is mostly window right-censoring of the second order."
    guardrails:
      do_not_use_when:
        - "The analysis needs lifetime repeat behavior - the window is too short; this is a within-window lower bound."
        - "Periods with very few purchasers (denominator instability)."
      misinterpretations:
        - "Not repeat-VISIT retention; a user can return many times yet buy only once (rate excludes them from numerator)."
        - "Not the inverse of churn."
      simpsons_paradox_risk: "Across channel_group and device_category: high-volume one-time-buyer channels (e.g. Display) can drag the blended rate. Aggregate SUM/SUM and decompose."
      attribution_pitfalls: "If sliced by channel_group, the channel is the order's session channel (first-touch gotcha); a user's two orders may be attributed to different channels, splitting one repeat buyer across segments."
      segmentation_pitfalls: "Per-segment purchaser counts are small in a 3-month e-commerce sample; narrow slices give unstable rates. Enforce a minimum purchaser count per cell."
    root_cause:
      upstream_drivers: [repeat_purchasers, purchasers]
      downstream_impacts: [revenue, revenue_per_user, aov]
      related_dimensions: [channel_group, device_category, country]
      decomposition_path: "Split by acquisition channel_group x device_category; decompose_change to separate purchaser-mix shift from in-segment repeat-rate change; drill the largest rate-effect segment."
    agents: [Monitor, Decompose, Diagnose, Prescribe, Critic, Narrator]
    validation_checks:
      - "0 <= value <= 1"
      - "repeat_purchasers <= purchasers"
      - "reconciles to warehouse-mcp.reconcile within 0.5%"
    testing:
      dbt_tests: ["not_null", "dbt_utils.accepted_range: 0..1"]
      quality_checks:
        - "repeat_purchasers <= purchasers always"
        - "a user counted in repeat_purchasers has >=2 distinct transaction_id in-window"
      anomaly_checks: ["stl-residual on weekly buyer series, weekly seasonality aware"]
      reconciliation_checks: ["distinct-buyer recompute from fct_orders matches semantic value within 0.5%"]
    freshness_requirements: "daily; available <=36h after event_date; value for recent buyers keeps maturing as later orders land"

  # --- RETENTION supporting measures (grain fct_cohorts) ---------------------

  - metric_name: cohort_size
    label: "Cohort Size"
    category: supporting
    type: count
    business_definition: "Supporting measure: the FIXED number of distinct users acquired in a weekly cohort (grouped by ISO week of user_first_touch_timestamp). The denominator for every day_N_retention rate; constant across cohort age."
    sql_definition: "SUM(cohort_size)"
    aggregation_method: sum
    grain: fct_cohorts
    entity: cohort
    numerator: null
    denominator: null
    expr: null
    dimensions_supported: [device_category, country, channel_group, source, medium, campaign, week, month, quarter]
    owner: analytics-eng
    version: 1.0.0
    caveats:
      - "Pre-aggregated count of distinct first-touch users per cohort, stored once per cohort row; SUM over the cohort-x-age grain double-counts if age is not collapsed - aggregate at one age (e.g. age=0) or use a deduplicated cohort dimension."
      - "Counts distinct user_pseudo_id (cookie); cookie churn means cohort size is a device-cookie count, not a distinct-human count."
      - "Cohort assignment is first-touch; a user belongs to exactly one cohort for life."
    common_mistakes:
      - "Summing cohort_size across cohort ages (it repeats per age row) and overstating acquisition."
      - "Using it as a window-wide user count - it is per-cohort, not the same as the users metric."
    guardrails:
      do_not_use_when:
        - "A general 'users in window' count is needed - use the users metric (cluster 02) instead."
      misinterpretations:
        - "It is the FIXED acquisition base, not the surviving population at any age."
      simpsons_paradox_risk: "Not a rate; no Simpson's risk itself, but it is the weight that drives Simpson's effects in retention rates."
      attribution_pitfalls: "Cohort channel is first-touch session source."
      segmentation_pitfalls: "Slicing into tiny cohort cells makes the retention rates that divide by it unstable."
    root_cause:
      upstream_drivers: [new_users]
      downstream_impacts: [day_1_retention, day_7_retention, day_30_retention]
      related_dimensions: [channel_group, device_category, country]
      decomposition_path: "Acts as the mix weight for retention; split by channel_group to see acquisition composition feeding cohort-mix shifts."
    agents: [Decompose, Diagnose, Critic]
    validation_checks:
      - "cohort_size > 0 for every cohort"
      - "cohort_size is constant across ages within a cohort"
    testing:
      dbt_tests: ["not_null", "dbt_utils.accepted_range: 1.."]
      quality_checks: ["cohort_size identical for all age rows of the same cohort_week"]
      anomaly_checks: ["stl-residual on weekly acquisition (cohort_size) series, weekly seasonality aware"]
      reconciliation_checks: ["SUM of distinct cohort_size across cohorts reconciles to distinct new_users within 0.5%"]
    freshness_requirements: "daily; available <=36h after event_date (fixed once the acquisition week closes)"

  - metric_name: retained_users_d1
    label: "Retained Users (Day 1)"
    category: supporting
    type: count
    business_definition: "Supporting measure: distinct users from a cohort who had any session on/by lifecycle day 1. Numerator of day_1_retention."
    sql_definition: "SUM(retained_users_d1)"
    aggregation_method: sum
    grain: fct_cohorts
    entity: cohort
    numerator: null
    denominator: null
    expr: null
    dimensions_supported: [device_category, country, channel_group, source, medium, campaign, week, month, quarter]
    owner: analytics-eng
    version: 1.0.0
    caveats:
      - "Cumulative return BY day 1 (includes day-0/day-1 activity per the cohort_retention definition), not activity exactly on day 1."
      - "Cookie-based: undercounts humans returning on a different cookie/device."
      - "<= cohort_size by construction."
    common_mistakes:
      - "Treating it as a rate (it is a raw count; divide by cohort_size for the rate)."
      - "Summing across ages - it is stored per cohort-age cell; pair with the matching cohort_size."
    guardrails:
      do_not_use_when:
        - "A rate is wanted - use day_1_retention."
      misinterpretations:
        - "Not 'new users on day 1'; it is returners from a fixed prior cohort."
      simpsons_paradox_risk: "As a numerator it participates in retention Simpson's effects; aggregate with its denominator."
      attribution_pitfalls: "Cohort channel is first-touch."
      segmentation_pitfalls: "Small in narrow cohort cells."
    root_cause:
      upstream_drivers: [cohort_size]
      downstream_impacts: [day_1_retention]
      related_dimensions: [channel_group, device_category, country]
      decomposition_path: "Numerator leg of day_1_retention; analyze via day_1_retention's decomposition path."
    agents: [Diagnose, Critic]
    validation_checks:
      - "0 <= retained_users_d1 <= cohort_size"
    testing:
      dbt_tests: ["not_null", "dbt_utils.accepted_range: 0.."]
      quality_checks: ["retained_users_d1 <= cohort_size per cohort row"]
      anomaly_checks: ["stl-residual on weekly cohort numerator series, weekly seasonality aware"]
      reconciliation_checks: ["additive recompute of distinct day-1 returners matches within 0.5%"]
    freshness_requirements: "daily; available <=36h after event_date (final once cohort is >=1 day old)"

  - metric_name: retained_users_d7
    label: "Retained Users (Day 7)"
    category: supporting
    type: count
    business_definition: "Supporting measure: distinct users from a cohort who had any session by lifecycle day 7. Numerator of day_7_retention."
    sql_definition: "SUM(retained_users_d7)"
    aggregation_method: sum
    grain: fct_cohorts
    entity: cohort
    numerator: null
    denominator: null
    expr: null
    dimensions_supported: [device_category, country, channel_group, source, medium, campaign, week, month, quarter]
    owner: analytics-eng
    version: 1.0.0
    caveats:
      - "Cumulative return BY day 7; <= retained_users_d1."
      - "Only FINAL once the cohort is >=7 days past first touch; for younger cohorts the value is still maturing (right-censored) and must not be divided into a published d7 rate."
      - "Cookie-based undercount of human return."
    common_mistakes:
      - "Dividing an immature (censored) d7 numerator by cohort_size and publishing a depressed d7 rate."
      - "Treating the count as a rate."
    guardrails:
      do_not_use_when:
        - "The cohort is <7 days old (value still maturing)."
      misinterpretations:
        - "Cumulative BY day 7, not exactly ON day 7."
      simpsons_paradox_risk: "Numerator leg of a rate with cohort-mix Simpson's risk."
      attribution_pitfalls: "Cohort channel is first-touch."
      segmentation_pitfalls: "Small in narrow / late cohort cells."
    root_cause:
      upstream_drivers: [retained_users_d1, cohort_size]
      downstream_impacts: [day_7_retention]
      related_dimensions: [channel_group, device_category, country]
      decomposition_path: "Numerator leg of day_7_retention; analyze via day_7_retention's decomposition path on mature cohorts only."
    agents: [Diagnose, Critic]
    validation_checks:
      - "0 <= retained_users_d7 <= retained_users_d1 <= cohort_size"
      - "only counted final for cohorts >=7 days old"
    testing:
      dbt_tests: ["not_null", "dbt_utils.accepted_range: 0.."]
      quality_checks: ["retained_users_d7 <= retained_users_d1 per cohort row", "immature cohorts flagged"]
      anomaly_checks: ["stl-residual on weekly mature-cohort numerator series, weekly seasonality aware"]
      reconciliation_checks: ["additive recompute of distinct day-7 returners over mature cohorts matches within 0.5%"]
    freshness_requirements: "daily; FINAL only once cohort is >=7 days past first touch"

  - metric_name: retained_users_d30
    label: "Retained Users (Day 30)"
    category: supporting
    type: count
    business_definition: "Supporting measure: distinct users from a cohort who had any session by lifecycle day 30. Numerator of day_30_retention. Observable only for cohorts with a full 30-day horizon inside the ~3-month window."
    sql_definition: "SUM(retained_users_d30)"
    aggregation_method: sum
    grain: fct_cohorts
    entity: cohort
    numerator: null
    denominator: null
    expr: null
    dimensions_supported: [device_category, country, channel_group, source, medium, campaign, week, month, quarter]
    owner: analytics-eng
    version: 1.0.0
    caveats:
      - "Cumulative return BY day 30; <= retained_users_d7."
      - "SEVERELY right-censored: FINAL only for cohorts >=30 days old, which within this ~3-month sample is essentially the earliest (November/early-December) cohorts. For all later cohorts the value is incomplete and must be excluded from any d30 rate."
      - "Cookie-based undercount, amplified over a 30-day horizon."
    common_mistakes:
      - "Including censored late-cohort d30 counts and publishing a near-zero d30 rate (the headline censoring trap)."
      - "Treating the count as a rate."
    guardrails:
      do_not_use_when:
        - "The cohort is <30 days old (value not yet observable; exclude)."
      misinterpretations:
        - "Cumulative BY day 30, not active-on-day-30."
      simpsons_paradox_risk: "Numerator leg; censoring bias dominates Simpson's risk here."
      attribution_pitfalls: "Cohort channel is first-touch; mature cohorts are holiday-skewed."
      segmentation_pitfalls: "Mature-cohort set is tiny; deep slicing yields empty cells."
    root_cause:
      upstream_drivers: [retained_users_d7, cohort_size]
      downstream_impacts: [day_30_retention]
      related_dimensions: [channel_group, device_category, country]
      decomposition_path: "Numerator leg of day_30_retention; only analyzable on the few mature cohorts, with a censoring caveat."
    agents: [Diagnose, Critic]
    validation_checks:
      - "0 <= retained_users_d30 <= retained_users_d7 <= cohort_size"
      - "only counted final for cohorts >=30 days old"
    testing:
      dbt_tests: ["not_null", "dbt_utils.accepted_range: 0.."]
      quality_checks: ["retained_users_d30 <= retained_users_d7 per cohort row", "censored cohorts excluded from any published d30 rate"]
      anomaly_checks: ["level-check against mature-cohort baseline only (too few points for stl-residual trend)"]
      reconciliation_checks: ["additive recompute of distinct day-30 returners over MATURE cohorts matches within 0.5%"]
    freshness_requirements: "daily; FINAL only once cohort is >=30 days past first touch - rarely reached within this sample"

  # --- RETENTION supporting measures (grain fct_orders) ----------------------

  - metric_name: purchasers
    label: "Purchasers"
    category: supporting
    type: count
    business_definition: "Supporting measure: distinct users who placed at least one order in the window (>=1 distinct transaction_id). Denominator of repeat_purchase_rate."
    sql_definition: "COUNT(DISTINCT IF(user_order_count >= 1, buyer_user_id, NULL))"
    aggregation_method: count_distinct
    grain: fct_orders
    entity: user
    numerator: null
    denominator: null
    expr: null
    dimensions_supported: [device_category, country, channel_group, source, medium, campaign, is_new_user, day, week, month, quarter]
    owner: analytics-eng
    version: 1.0.0
    caveats:
      - "Distinct BUYERS (user_pseudo_id with >=1 order), not orders and not purchasing_sessions; a buyer with multiple sessions/orders counts once."
      - "Cookie-based buyer identity: a buyer on two cookies counts twice."
      - "Window-bounded: only buyers whose order falls inside the window."
    common_mistakes:
      - "Confusing purchasers (distinct buyers) with orders/transactions (order count) or with purchasing_sessions (session count)."
      - "Using purchasing_users (cluster 03, session-funnel grain) interchangeably - purchasers is order-grain and counts only confirmed transactions."
    guardrails:
      do_not_use_when:
        - "A session-level conversion denominator is needed - use sessions / purchasing_sessions (cluster 03)."
      misinterpretations:
        - "Not the same as purchasing_sessions; one buyer can have many purchasing sessions."
      simpsons_paradox_risk: "As a denominator it weights repeat_purchase_rate; aggregate with its numerator."
      attribution_pitfalls: "If sliced by channel, the channel is the order's session channel (first-touch gotcha)."
      segmentation_pitfalls: "Small per-segment buyer counts in a 3-month sample."
    root_cause:
      upstream_drivers: [orders]
      downstream_impacts: [repeat_purchase_rate]
      related_dimensions: [channel_group, device_category, country]
      decomposition_path: "Denominator of repeat_purchase_rate; analyze via that metric's decomposition path."
    agents: [Diagnose, Critic]
    validation_checks:
      - "purchasers >= repeat_purchasers"
      - "purchasers >= 0"
    testing:
      dbt_tests: ["not_null", "dbt_utils.accepted_range: 0.."]
      quality_checks: ["purchasers <= users (cluster 02) for the same window/slice"]
      anomaly_checks: ["stl-residual on weekly buyer series, weekly seasonality aware"]
      reconciliation_checks: ["distinct-buyer recompute from fct_orders matches within 0.5%"]
    freshness_requirements: "daily; available <=36h after event_date"

  - metric_name: repeat_purchasers
    label: "Repeat Purchasers"
    category: supporting
    type: count
    business_definition: "Supporting measure: distinct users who placed two or more orders in the window (>=2 distinct transaction_id). Numerator of repeat_purchase_rate."
    sql_definition: "COUNT(DISTINCT IF(user_order_count >= 2, buyer_user_id, NULL))"
    aggregation_method: count_distinct
    grain: fct_orders
    entity: user
    numerator: null
    denominator: null
    expr: null
    dimensions_supported: [device_category, country, channel_group, source, medium, campaign, is_new_user, day, week, month, quarter]
    owner: analytics-eng
    version: 1.0.0
    caveats:
      - "Distinct buyers with >=2 distinct orders IN-WINDOW; right-censored - a 2nd order after the window does not count, so this is a lower bound."
      - "Cookie-based: a buyer's two orders on two cookies read as two one-time buyers and are NOT counted as repeat."
      - "'Repeat' = >=2 orders, not >=2 units of one item."
    common_mistakes:
      - "Counting orders >=2 instead of distinct users with >=2 orders."
      - "Reading a low count as disloyalty rather than window censoring of the second order."
    guardrails:
      do_not_use_when:
        - "Lifetime repeat behavior is required (window too short)."
      misinterpretations:
        - "Not repeat-visit users; these are repeat BUYERS."
      simpsons_paradox_risk: "Numerator leg of repeat_purchase_rate."
      attribution_pitfalls: "Channel = order session channel (first-touch); a user's two orders may split across channels, breaking the repeat flag in channel slices."
      segmentation_pitfalls: "Very small per-segment counts."
    root_cause:
      upstream_drivers: [purchasers, orders]
      downstream_impacts: [repeat_purchase_rate, revenue]
      related_dimensions: [channel_group, device_category, country]
      decomposition_path: "Numerator of repeat_purchase_rate; analyze via that metric's decomposition path."
    agents: [Diagnose, Critic]
    validation_checks:
      - "0 <= repeat_purchasers <= purchasers"
    testing:
      dbt_tests: ["not_null", "dbt_utils.accepted_range: 0.."]
      quality_checks: ["every repeat purchaser has >=2 distinct transaction_id in-window", "repeat_purchasers <= purchasers"]
      anomaly_checks: ["stl-residual on weekly repeat-buyer series, weekly seasonality aware"]
      reconciliation_checks: ["distinct >=2-order buyer recompute from fct_orders matches within 0.5%"]
    freshness_requirements: "daily; available <=36h after event_date; keeps maturing as later orders land"

  # ===========================================================================
  # ACQUISITION (cluster 04)
  # ===========================================================================

  - metric_name: channel_revenue
    label: "Channel Revenue"
    category: acquisition
    type: sum
    business_definition: "Gross order revenue (sum of gross_revenue at order grain) attributed to each acquisition channel. Shows which channels generate sales dollars. REQUIRES the channel_group dimension - it is meaningless ungrouped (it would just equal total gross_revenue)."
    sql_definition: "SUM(gross_revenue)"
    aggregation_method: sum
    grain: fct_orders
    entity: order
    numerator: null
    denominator: null
    expr: null
    dimensions_supported: [channel_group, source, medium, campaign, device_category, country, region, is_new_user, day, week, month, quarter]
    owner: analytics-eng
    version: 1.0.0
    caveats:
      - "REQUIRED dimension channel_group (or finer source/medium/campaign): without it the metric is just total gross_revenue and carries no channel meaning."
      - "Uses *_in_usd revenue only; non-USD twins are never aggregated."
      - "Channel is the order's SESSION channel - last-non-direct-style session attribution, NOT multi-touch credit; a journey touching several channels assigns all dollars to one."
      - "Order-grain gross_revenue reconciles to session-attributed revenue (cluster 01) only at the grand total, not necessarily per channel."
    common_mistakes:
      - "Reporting channel_revenue without channel_group (returns total revenue, falsely labeled per-channel)."
      - "Treating single-touch channel attribution as the channel's true incremental contribution."
      - "Comparing to session-attributed revenue per channel and expecting an exact tie (different grains/attribution)."
    guardrails:
      do_not_use_when:
        - "No channel/source dimension is applied (degenerate - use gross_revenue from cluster 01)."
        - "Incremental or multi-touch channel contribution is the question (this is single-touch)."
      misinterpretations:
        - "Not profit and not net of refunds unless gross is explicitly net-adjusted - it is gross order revenue."
        - "Not marketing ROI: there is NO cost side in this dataset."
      simpsons_paradox_risk: "Low for a raw sum, but per-channel revenue mix shifts can mislead trend reads; pair with channel_conversion_rate and traffic_share."
      attribution_pitfalls: "Single-touch session attribution; plus the traffic_source FIRST-TOUCH gotcha - channel_group is derived from session-scoped event_params.source/medium and falls back to event-level traffic_source (user first-touch) only when null, so some sessions inherit a first-touch channel rather than their true session channel."
      segmentation_pitfalls: "Long-tail source/campaign values fragment revenue into noisy slivers; prefer channel_group for stable comparison."
    root_cause:
      upstream_drivers: [orders, aov, channel_conversion_rate]
      downstream_impacts: [revenue, gross_revenue]
      related_dimensions: [channel_group, source, campaign]
      decomposition_path: "Split gross_revenue by channel_group; decompose channel revenue change into traffic_share (mix) x channel_conversion_rate x aov; drill the channel with the largest rate-driven swing."
    agents: [Monitor, Decompose, Diagnose, Narrator, Critic]
    validation_checks:
      - "channel_group dimension present in the query"
      - "SUM over channels reconciles to total gross_revenue within 0.5%"
      - "channel_revenue >= 0"
    testing:
      dbt_tests: ["not_null", "dbt_utils.accepted_range: 0.."]
      quality_checks: ["sum across channel_group equals gross_revenue grand total"]
      anomaly_checks: ["stl-residual on daily per-channel revenue series, weekly seasonality aware"]
      reconciliation_checks: ["per-channel sum reconciles to fct_orders gross_revenue and to total within 0.5%"]
    freshness_requirements: "daily; available <=36h after event_date"

  - metric_name: channel_conversion_rate
    label: "Channel Conversion Rate"
    category: acquisition
    type: ratio
    business_definition: "Session conversion rate computed per acquisition channel: purchasing sessions divided by all sessions within the channel. Shows which channels convert efficiently. REQUIRES the channel_group dimension."
    sql_definition: "SAFE_DIVIDE(COUNTIF(reached_purchase), COUNT(DISTINCT session_key))"
    aggregation_method: ratio
    grain: fct_funnel
    entity: session
    numerator: purchasing_sessions
    denominator: sessions
    expr: null
    dimensions_supported: [channel_group, source, medium, campaign, device_category, operating_system, browser, country, region, landing_page, is_new_user, day, week, month, quarter]
    owner: analytics-eng
    version: 1.0.0
    caveats:
      - "REQUIRED dimension channel_group: ungrouped it collapses to the overall session_conversion_rate (cluster 03) and loses channel meaning."
      - "Computed SUM(num)/SUM(den) WITHIN each channel - never the average of session-level rates (Simpson's defense)."
      - "Channel = session source via the channel_group macro; subject to the first-touch fallback gotcha."
      - "Brand/Direct and Email channels convert high because of intent/loyalty, not channel efficiency - do not read as incremental acquisition lift."
    common_mistakes:
      - "Comparing channel conversion rates without weighting by traffic_share - a high-rate, low-volume channel may move little revenue."
      - "Averaging per-session or per-day rates instead of SUM/SUM."
      - "Attributing high Direct/Organic conversion to marketing effectiveness (it is largely returning/high-intent demand)."
    guardrails:
      do_not_use_when:
        - "No channel dimension applied (use session_conversion_rate from cluster 03)."
        - "Channels are compared in isolation from volume - always pair with traffic_share."
      misinterpretations:
        - "Not user conversion (it is session-grain); high session conversion can coexist with low user conversion."
        - "High rate != high value without volume."
      simpsons_paradox_risk: "HIGH: blended session_conversion_rate can move purely from channel mix (traffic_share) shifting toward low/high-converting channels even with every channel flat. This is the canonical decompose_change case - separate mix from rate."
      attribution_pitfalls: "traffic_source FIRST-TOUCH gotcha: channel_group prefers session-scoped event_params.source/medium and falls back to user first-touch traffic_source only when null; first-touch fallback misattributes the converting session's channel, inflating/deflating the wrong channel."
      segmentation_pitfalls: "Low-volume channels (Affiliates, Email) produce unstable rates; enforce a minimum-sessions floor before comparing."
    root_cause:
      upstream_drivers: [purchasing_sessions, sessions]
      downstream_impacts: [channel_revenue, revenue, session_conversion_rate, revenue_per_session]
      related_dimensions: [channel_group, device_category, landing_page]
      decomposition_path: "Split session_conversion_rate by channel_group (weights = traffic_share); run decompose_change to split blended movement into mix_effect (traffic_share shifts) vs rate_effect (in-channel conversion) vs interaction; drill the largest rate-effect channel x device_category."
    agents: [Monitor, Decompose, Diagnose, Prescribe, Critic]
    validation_checks:
      - "0 <= value <= 1"
      - "channel_group dimension present in the query"
      - "session-weighted average over channels reconciles to overall session_conversion_rate within 0.5%"
    testing:
      dbt_tests: ["not_null", "dbt_utils.accepted_range: 0..1"]
      quality_checks: ["purchasing_sessions <= sessions within every channel"]
      anomaly_checks: ["stl-residual on daily per-channel conversion series, weekly seasonality aware"]
      reconciliation_checks: ["SUM(purchasing_sessions)/SUM(sessions) over channels reconciles to overall session_conversion_rate within 0.5%"]
    freshness_requirements: "daily; available <=36h after event_date"

  - metric_name: cac_proxy
    label: "CAC Proxy (NOT true CAC)"
    category: acquisition
    type: derived
    business_definition: "A VOLUME-EFFICIENCY PROXY: paid sessions per newly-acquired customer (paid_sessions / new_purchasers). It approximates 'how much paid traffic it takes to win one new buyer.' It is explicitly NOT Customer Acquisition Cost - the GA4 export has no spend data, so no dollar CAC can be computed here."
    sql_definition: "SAFE_DIVIDE(paid_sessions, new_purchasers)"
    aggregation_method: derived
    grain: fct_funnel
    entity: session
    numerator: null
    denominator: null
    expr: "SAFE_DIVIDE({paid_sessions}, {new_purchasers})"
    dimensions_supported: [channel_group, source, medium, campaign, device_category, country, day, week, month, quarter]
    owner: analytics-eng
    version: 1.0.0
    caveats:
      - "NOT TRUE CAC. True CAC = marketing_spend / new_customers. This dataset (GA4 obfuscated sample) contains NO cost/spend column, so a dollar CAC is impossible here."
      - "cac_proxy is a unitless RATIO of paid sessions to new buyers - a volume-efficiency proxy, not money. A lower value means fewer paid sessions per new customer (more efficient), not cheaper acquisition in dollars."
      - "Real CAC requires an EXTERNAL marketing-spend table joined by channel/campaign/date (deferred; Bible roadmap). Until then, never present cac_proxy as CAC, ROAS, or payback."
      - "paid_sessions counts sessions in paid channels (Paid Search, Paid Social, Display); new_purchasers counts distinct NEW users who purchased - the two have different denominators of meaning, so the proxy is directional, not a literal per-customer cost."
      - "Single-touch attribution plus the first-touch fallback gotcha biases which sessions/customers are credited to 'paid'."
    common_mistakes:
      - "Calling it CAC, multiplying by a CPC to fake a dollar cost, or feeding it into ROAS/payback - all invalid without real spend."
      - "Comparing cac_proxy across periods without noting paid-channel mix shifts (Display vs Paid Search have very different session-to-customer ratios)."
      - "Forgetting new_purchasers is NEW users only; existing-customer purchases driven by paid traffic are not in the denominator."
    guardrails:
      do_not_use_when:
        - "Any dollar-denominated acquisition-cost, ROAS, LTV:CAC, or payback question is asked - there is no cost data; defer to an external spend table."
        - "new_purchasers is very small (proxy explodes / is unstable)."
        - "Organic-only or all-channel scope (paid_sessions would be partial or the proxy meaningless)."
      misinterpretations:
        - "It is NOT dollars. It is paid sessions per new customer."
        - "Lower is 'more efficient volume', but cheaper-in-dollars cannot be inferred."
      simpsons_paradox_risk: "Paid-channel mix shifts (more cheap-converting Paid Search vs more Display) move the blended proxy without any real efficiency change; decompose by paid channel before concluding."
      attribution_pitfalls: "Paid-channel membership and new-customer credit both depend on session-channel attribution and the traffic_source first-touch fallback; misattribution distorts both numerator and denominator."
      segmentation_pitfalls: "Per-campaign new_purchasers is tiny, making the proxy extremely noisy; aggregate to channel_group."
    root_cause:
      upstream_drivers: [paid_sessions, new_purchasers]
      downstream_impacts: [channel_conversion_rate, channel_revenue]
      related_dimensions: [channel_group, campaign, device_category]
      decomposition_path: "Split by paid channel_group x campaign; inspect paid_sessions (numerator) vs new_purchasers (denominator) separately; pair with channel_conversion_rate to see whether efficiency moved from volume or from conversion. NOTE the honest ceiling: without spend, stop at volume efficiency."
    agents: [Diagnose, Prescribe, Critic]
    validation_checks:
      - "cac_proxy >= 0"
      - "rendered with the explicit 'NOT true CAC' label and a no-cost-data caveat"
      - "reconciles to warehouse-mcp.reconcile within 0.5% (paid_sessions and new_purchasers legs)"
    testing:
      dbt_tests: ["not_null"]
      quality_checks: ["paid_sessions restricted to Paid Search / Paid Social / Display only", "new_purchasers are distinct NEW users with a purchase"]
      anomaly_checks: ["stl-residual on weekly proxy series, weekly seasonality aware (flag mix-driven swings)"]
      reconciliation_checks: ["paid_sessions and new_purchasers each reconcile to additive recompute within 0.5%"]
    freshness_requirements: "daily; available <=36h after event_date"

  - metric_name: traffic_share
    label: "Traffic Share (mix weight w_i)"
    category: acquisition
    type: derived
    business_definition: "Each channel's share of total sessions (sessions in segment / total sessions across all segments). This IS the mix weight w_i in the core decomposition identity dR = SUM(dw_i*r_i) + SUM(w_i*dr_i) + SUM(dw_i*dr_i): it quantifies how traffic COMPOSITION (not behavior) is distributed and how it shifts over time."
    sql_definition: "SAFE_DIVIDE(COUNT(DISTINCT session_key), SUM(COUNT(DISTINCT session_key)) OVER ())"
    aggregation_method: window
    grain: fct_funnel
    entity: session
    numerator: null
    denominator: null
    expr: "SAFE_DIVIDE(sessions, SUM(sessions) OVER ())"
    dimensions_supported: [channel_group, source, medium, campaign, device_category, operating_system, browser, country, region, landing_page, is_new_user, session_number_bucket, day, week, month, quarter]
    owner: analytics-eng
    version: 1.0.0
    caveats:
      - "WINDOW metric: the denominator is the SUM of sessions over the OVER() partition (the whole result set / period). The share depends entirely on which segments and window are in scope - changing the grouping or date range changes every share."
      - "This is the mix weight w_i fed to stats-mcp.decompose_change. Delta(traffic_share) over t0->t1 is exactly dw_i, the MIX-EFFECT driver. A blended-rate move with no behavior change is a pure mix-shift story told by traffic_share."
      - "Shares of all segments in scope sum to 1 (100%); a single segment's share is only interpretable against that total."
      - "Session-grain shares; subject to the channel first-touch fallback gotcha when sliced by channel_group/source."
    common_mistakes:
      - "Comparing traffic_share across queries with different segment sets or windows (the denominator differs, so shares are not comparable)."
      - "Reading a rising share as growth when total sessions fell (share can rise while absolute sessions drop)."
      - "Ignoring traffic_share when interpreting a blended-rate change - mix shift is the most common false 'rate' signal."
    guardrails:
      do_not_use_when:
        - "Absolute volume is the question - use the sessions count, not its share."
        - "Segments are filtered to a subset (shares no longer sum to a meaningful 100%)."
      misinterpretations:
        - "Share is relative, not absolute; a higher share does not imply more sessions."
        - "It describes COMPOSITION (mix), never conversion or behavior (rate)."
      simpsons_paradox_risk: "traffic_share IS the weight that CREATES Simpson's paradox: shifting weight toward low-converting segments lowers the blended rate even when every segment is flat. decompose_change uses traffic_share to quantify and remove exactly this mix_effect."
      attribution_pitfalls: "When sliced by channel_group/source, share inherits the traffic_source first-touch fallback gotcha; misattributed sessions shift the apparent mix."
      segmentation_pitfalls: "Long-tail segments produce many tiny shares; bucket the long tail (e.g. to channel_group) so the mix decomposition is stable and interpretable."
    root_cause:
      upstream_drivers: [sessions]
      downstream_impacts: [channel_conversion_rate, session_conversion_rate, revenue_per_session, channel_revenue]
      related_dimensions: [channel_group, device_category, landing_page]
      decomposition_path: "traffic_share = w_i. In decompose_change, Delta(traffic_share) drives mix_effect = SUM(dw_i*r_i(t0)); pair with each segment's rate (r_i) to attribute a blended-rate move to mix vs rate vs interaction; drill rate-effects, discount mix-effects as composition artifacts."
    agents: [Decompose, Diagnose, Critic, Narrator]
    validation_checks:
      - "0 <= value <= 1"
      - "shares across all in-scope segments sum to 1.0 within 0.5%"
      - "reconciles to warehouse-mcp.reconcile within 0.5%"
    testing:
      dbt_tests: ["dbt_utils.accepted_range: 0..1"]
      quality_checks: ["SUM(traffic_share) over the partition equals 1.0 within tolerance", "window partition (OVER()) matches the query's segment scope"]
      anomaly_checks: ["stl-residual on daily per-segment share series, weekly seasonality aware (mix-shift detection)"]
      reconciliation_checks: ["share numerator (sessions) and denominator (total sessions) reconcile to fct_funnel within 0.5%"]
    freshness_requirements: "daily; available <=36h after event_date"

  # --- ACQUISITION supporting measures (grain fct_funnel) --------------------

  - metric_name: paid_sessions
    label: "Paid Sessions"
    category: supporting
    type: count
    business_definition: "Supporting measure: count of sessions in PAID acquisition channels (channel_group in Paid Search, Paid Social, Display). Numerator of cac_proxy and the volume base for paid-channel efficiency."
    sql_definition: "COUNTIF(channel_group IN ('Paid Search','Paid Social','Display'))"
    aggregation_method: countif
    grain: fct_funnel
    entity: session
    numerator: null
    denominator: null
    expr: null
    dimensions_supported: [channel_group, source, medium, campaign, device_category, country, region, day, week, month, quarter]
    owner: analytics-eng
    version: 1.0.0
    caveats:
      - "Paid set is exactly Paid Search, Paid Social, Display (3 of the 10 canonical channel groups). Email and Affiliates are NOT counted as paid here (no cost data to justify it); document this choice explicitly."
      - "channel_group is derived via the channel_group_case() macro from session-scoped source/medium, with the traffic_source first-touch fallback gotcha; some sessions may be mis-bucketed as paid/non-paid."
      - "Counts sessions, not spend or clicks - there is no cost dimension."
    common_mistakes:
      - "Including Email/Affiliates/Referral in 'paid' (inconsistent with the registry definition)."
      - "Treating paid_sessions as paid clicks or ad impressions."
    guardrails:
      do_not_use_when:
        - "A spend- or click-based paid-media metric is needed (not derivable here)."
      misinterpretations:
        - "Not ad clicks; these are GA4 sessions classified as paid by channel grouping."
      simpsons_paradox_risk: "As cac_proxy's numerator it participates in paid-channel mix effects; decompose by paid channel."
      attribution_pitfalls: "First-touch fallback can misclassify a session's paid/non-paid status."
      segmentation_pitfalls: "Per-campaign paid_sessions can be sparse."
    root_cause:
      upstream_drivers: [sessions]
      downstream_impacts: [cac_proxy]
      related_dimensions: [channel_group, campaign, device_category]
      decomposition_path: "Numerator of cac_proxy; split by paid channel_group to see which paid channel drives volume."
    agents: [Diagnose, Critic]
    validation_checks:
      - "paid_sessions <= sessions"
      - "paid_sessions counts only Paid Search / Paid Social / Display"
    testing:
      dbt_tests: ["not_null", "dbt_utils.accepted_range: 0.."]
      quality_checks: ["channel_group values restricted to the 10 canonical groups", "paid_sessions <= sessions for the same slice"]
      anomaly_checks: ["stl-residual on daily paid-session series, weekly seasonality aware"]
      reconciliation_checks: ["paid_sessions reconciles to COUNTIF over fct_funnel within 0.5%"]
    freshness_requirements: "daily; available <=36h after event_date"

  - metric_name: new_purchasers
    label: "New Purchasers"
    category: supporting
    type: count
    business_definition: "Supporting measure: count of distinct NEW users (is_new_user TRUE) who purchased in the window. Denominator of cac_proxy - the 'newly acquired customers' the proxy divides paid sessions by."
    sql_definition: "COUNT(DISTINCT IF(is_new_user AND reached_purchase, user_pseudo_id, NULL))"
    aggregation_method: count_distinct
    grain: fct_funnel
    entity: user
    numerator: null
    denominator: null
    expr: null
    dimensions_supported: [channel_group, source, medium, campaign, device_category, country, region, day, week, month, quarter]
    owner: analytics-eng
    version: 1.0.0
    caveats:
      - "Distinct NEW users (is_new_user = first session, ga_session_number = 1) who reached purchase; existing-customer purchases are excluded."
      - "Cookie-based new-user flag: a returning human on a new cookie reads as is_new_user=TRUE, inflating 'new' purchasers."
      - "Session-funnel grain (fct_funnel reached_purchase), so it aligns with paid_sessions for cac_proxy; it is NOT the order-grain purchasers measure (different grain/identity)."
      - "Window-bounded; a new user who first purchases just after the window is not counted."
    common_mistakes:
      - "Confusing new_purchasers (new users who bought, funnel grain) with purchasers (all buyers, order grain) or with new_users (all new users regardless of purchase)."
      - "Using it as a true new-customer count despite cookie-churn inflation."
    guardrails:
      do_not_use_when:
        - "A confirmed-transaction order-grain buyer count is needed - use purchasers (order grain)."
        - "Existing-customer acquisition cost is the question (this counts only new users)."
      misinterpretations:
        - "Not all purchasers; only first-session (new) users who bought."
        - "Cookie-new, not provably human-new."
      simpsons_paradox_risk: "Denominator of cac_proxy; participates in paid-channel mix effects."
      attribution_pitfalls: "Channel credit for the new customer depends on session attribution and the first-touch fallback gotcha."
      segmentation_pitfalls: "Per-campaign new_purchasers is tiny and makes cac_proxy unstable; aggregate to channel_group."
    root_cause:
      upstream_drivers: [new_users, purchasing_sessions]
      downstream_impacts: [cac_proxy]
      related_dimensions: [channel_group, campaign, device_category]
      decomposition_path: "Denominator of cac_proxy; split by acquisition channel_group to see which channel wins new customers."
    agents: [Diagnose, Prescribe, Critic]
    validation_checks:
      - "new_purchasers <= new_users"
      - "new_purchasers >= 0"
    testing:
      dbt_tests: ["not_null", "dbt_utils.accepted_range: 0.."]
      quality_checks: ["every counted user has is_new_user = TRUE and reached_purchase = TRUE", "new_purchasers <= purchasing_users (cluster 03) for the same slice"]
      anomaly_checks: ["stl-residual on weekly new-purchaser series, weekly seasonality aware"]
      reconciliation_checks: ["distinct new-purchaser recompute from fct_funnel matches within 0.5%"]
    freshness_requirements: "daily; available <=36h after event_date"
